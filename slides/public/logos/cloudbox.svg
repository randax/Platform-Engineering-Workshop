<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- upper flaps (behind the cloud), folded open like wings -->
  <path d="M32 18 L26 8 L6 19 L12 29 Z" fill="#5cc5f7"/>
  <path d="M32 18 L38 8 L58 19 L52 29 Z" fill="#38bdf8"/>
