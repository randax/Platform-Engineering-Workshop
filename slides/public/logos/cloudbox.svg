  <path d="M12 29 L8 36 L28 47 L32 40 Z" fill="#5cc5f7"/>
  <path d="M32 40 L36 47 L56 36 L52 29 Z" fill="#38bdf8"/>
  <!-- cloud rising out of the box -->
  <path d="M21 35 C13 35 11 26 18 24 C17 16 28 15 30 22 C33 14 44 16 43 24 C50 24 50 35 43 35 Z"
        fill="#ffffff" stroke="#0b5a74" stroke-width="1.8" stroke-linejoin="round"/>
