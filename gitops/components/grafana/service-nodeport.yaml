# Workshop addition (not upstream): expose Grafana on a stable NodePort so the
# browser reaches it without a port-forward: http://localhost:30030
# 30030 is the canonical observability port (freed when otel-lgtm was retired in
# the #57 rework); the portal's GRAFANA_URL deep-links point here.
apiVersion: v1
kind: Service
metadata:
  name: grafana-nodeport
  namespace: observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: grafana
    app.kubernetes.io/component: http-nodeport
spec:
  type: NodePort
  ports:
    - name: http
      port: 3000
      targetPort: 3000
      nodePort: 30030
  selector:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: grafana
