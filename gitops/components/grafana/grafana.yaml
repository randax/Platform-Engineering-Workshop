---
# Grafana 12.4.5 — dashboards for the Victoria stack (observability rework,
# issue #57). Pre-wired with three provisioned datasources, all built-in types
# (no plugins — offline rule):
#   - VictoriaMetrics (Prometheus type, default) → PromQL/metrics
#   - VictoriaLogs    (Loki type)                → logs   (see VENDOR.md caveat)
#   - VictoriaTraces  (Jaeger type)              → traces (see VENDOR.md caveat)
# Anonymous read (Viewer) is on — workshop-grade. NodePort 30030
# (service-nodeport.yaml), the canonical observability port freed when otel-lgtm
# was retired; the portal's deep-links point here.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      # VictoriaMetrics via its NATIVE Grafana datasource plugin (#65), baked
      # into the image (see apps/grafana/Dockerfile) — the MetricsQL query editor
      # instead of the Prometheus shim. Same uid, so nothing that references it
      # by uid breaks.
      - name: VictoriaMetrics
        uid: victoriametrics
        type: victoriametrics-metrics-datasource
        access: proxy
        url: http://victoria-metrics.observability.svc.cluster.local:8428
        isDefault: true
        jsonData:
          httpMethod: POST
      # VictoriaLogs via its NATIVE datasource plugin — full LogsQL + the
      # VictoriaLogs Explore UX, not the lossy Loki shim. The native plugin takes
      # the VLogs base URL and appends its own /select/logsql paths (so no
      # /select suffix here, unlike the old Loki datasource).
      - name: VictoriaLogs
        uid: victorialogs
        type: victoriametrics-logs-datasource
        access: proxy
        url: http://victoria-logs.observability.svc.cluster.local:9428
      # VictoriaTraces exposes a Jaeger-compatible query API, so we use the
      # built-in Jaeger datasource (offline rule: no plugin at boot) pointed at
      # its /select/jaeger base. Replaces otel-lgtm's Tempo. See VENDOR.md.
      - name: VictoriaTraces
        uid: victoriatraces
        type: jaeger
        access: proxy
        url: http://victoria-traces.observability.svc.cluster.local:10428/select/jaeger
        jsonData:
          # Render each trace as a topology graph, not just a waterfall — the
          # Jaeger datasource's built-in Node Graph tab (#65). For the capstone's
          # one upload this IS the service map: portal → uploader → broker →
          # resizer as connected nodes. No plugin, works offline.
          nodeGraph:
            enabled: true
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: grafana
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  selector:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: grafana
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: grafana
    app.kubernetes.io/version: "12.4.5"
spec:
  replicas: 1
  # Single writable state (grafana.db on emptyDir), no HA needed for a lab.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
      app.kubernetes.io/instance: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/instance: grafana
    spec:
      securityContext:
        runAsNonRoot: true
        # 472 is the grafana image's built-in user/group.
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: grafana
          # Custom image: stock Grafana 12.4.5 + the native VictoriaMetrics
          # datasource plugins baked in (apps/grafana/Dockerfile, #65).
          image: "ghcr.io/randax/cloudbox-grafana:v0.1.0"
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ ALL ]
            # Grafana only writes /var/lib/grafana and /tmp (both emptyDir).
            readOnlyRootFilesystem: true
          env:
            # Anonymous read access (Viewer) — the workshop Grafana is open by
            # design. The login form stays available so an admin (default
            # admin/admin, ephemeral lab) can still edit.
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Viewer
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            # Offline rule: never phone home at boot.
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
            - name: GF_ANALYTICS_CHECK_FOR_UPDATES
              value: "false"
            # No plugins fetched at boot — they're BAKED into the image (#65).
            - name: GF_INSTALL_PLUGINS
              value: ""
            # Load the baked-in native VictoriaMetrics plugins from here. NOT the
            # default /var/lib/grafana/plugins — the data emptyDir below mounts
            # over /var/lib/grafana and would shadow it.
            - name: GF_PATHS_PLUGINS
              value: /opt/grafana-plugins
          ports:
            - name: http
              containerPort: 3000
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: data
              mountPath: /var/lib/grafana
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        # Ephemeral on purpose: dashboards are provisioned, and grafana.db does
        # not need to survive a pod restart in a 4-hour workshop.
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
