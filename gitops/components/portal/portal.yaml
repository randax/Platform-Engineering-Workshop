# Cloudbox Console — bespoke workshop portal (module 08). First-party app:
# source lives in apps/portal of this repo, image built by CI on GitHub.
# It reads platform state via the Kubernetes API (read-only ClusterRole),
# manages WorkshopDatabase XRs in the `demo` namespace (Role there — the
# namespace comes from module 04's demo component, so enable in module
# order), shows the picture gallery straight from RustFS and hands uploads
# to the uploader Knative Service from picture-pipeline.
apiVersion: v1
kind: Namespace
metadata:
  name: portal
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: portal
  namespace: portal
---
# Read-only view of exactly the platform surfaces the console renders:
# ArgoCD Applications, CNPG database Clusters, Knative Services, pods and
# namespaces. Deliberately NOT read-all (contrast with the Backstage demo).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: portal-read
rules:
  - apiGroups: [argoproj.io]
    resources: [applications]
    verbs: [get, list, watch]
  - apiGroups: [postgresql.cnpg.io]
    resources: [clusters]
    verbs: [get, list, watch]
  - apiGroups: [serving.knative.dev]
    resources: [services]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [pods, namespaces, nodes]
    verbs: [get, list, watch]
  # Workload readiness for the /components status page and /workshop checklist.
  - apiGroups: [apps]
    resources: [deployments, statefulsets, daemonsets]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: portal-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: portal-read
subjects:
  - kind: ServiceAccount
    name: portal
    namespace: portal
---
# The self-service page: full lifecycle of WorkshopDatabase XRs
# (Crossplane v2 namespaced XR, see lab/04-self-service/platform/xrd.yaml —
# group platform.cloudbox.io, plural workshopdatabases), scoped to the
# `demo` namespace only. Requires the demo namespace to exist (module 04);
# ArgoCD retries the sync until it does.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: portal-workshopdatabases
  namespace: demo
rules:
  - apiGroups: [platform.cloudbox.io]
    resources: [workshopdatabases]
    verbs: [create, get, list, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: portal-workshopdatabases
  namespace: demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: portal-workshopdatabases
subjects:
  - kind: ServiceAccount
    name: portal
    namespace: portal
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      serviceAccountName: portal
      containers:
        - name: portal
          # Built by CI from apps/portal (multi-arch). Must be in the
          # pre-pull list (scripts/images.txt).
          image: ghcr.io/randax/cloudbox-portal:v0.1.0
          env:
            # The uploader is a cluster-local Knative Service in the
            # pipeline namespace — this is its ksvc cluster-local URL
            # (Knative answers on the service's root domain, no port).
            - name: UPLOADER_URL
              value: http://uploader.pipeline.svc.cluster.local
            # WORKSHOP-GRADE CREDENTIALS, committed on purpose (ephemeral
            # lab sandbox) — must match the rustfs component.
            - name: S3_ENDPOINT
              value: http://rustfs-svc.rustfs.svc.cluster.local:9000
            - name: S3_ACCESS_KEY
              value: cloudbox
            - name: S3_SECRET_KEY
              value: cloudbox123
            # Created by the picture-pipeline component's setup Job — the
            # gallery is empty (but the page loads) until that is enabled.
            - name: S3_BUCKET
              value: images
            # Host the BROWSER uses for presigned URLs (the RustFS NodePort
            # as seen from the attendee's machine). Matches NODEPORT_RUSTFS_S3.
            - name: S3_PUBLIC_ENDPOINT
              value: localhost:30900
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: portal
  namespace: portal
spec:
  type: NodePort
  ports:
    - name: http
      port: 8080
      targetPort: http
      nodePort: 30600
  selector:
    app: portal
