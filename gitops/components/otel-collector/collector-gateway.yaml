---
# OTel Collector GATEWAY — a single-replica Deployment (issue #57, Stage 2).
# Handles the receivers that must run exactly once cluster-wide (running them
# per-node would double-count):
#   - k8s_cluster → cluster object-state metrics (deployment/pod counts, node
#                   conditions, allocatable cpu/mem)
#   - prometheus  → scrape component /metrics via annotation-based pod discovery
#                   (any pod with prometheus.io/scrape: "true") → VictoriaMetrics.
#                   This is what finally collects CNPG / Knative / etc. metrics.
#   - otlp        → 4317/4318 receiver, STAGED for the app + Knative cut-over in
#                   Stage 3. Apps still push to lgtm today, so nothing hits this
#                   yet; wiring it now means Stage 3 is just an endpoint swap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-gateway
  namespace: observability
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/instance: otel-collector-gateway
data:
  config.yaml: |
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      k8s_cluster:
        collection_interval: 30s
        node_conditions_to_report: [ Ready, MemoryPressure, DiskPressure ]
        allocatable_types_to_report: [ cpu, memory ]
      # Classic annotation-based scrape: discover every pod, keep only those
      # annotated prometheus.io/scrape: "true", honour prometheus.io/port and
      # prometheus.io/path. Components opt in with those annotations.
      # NB: literal prometheus replacement refs are written $$1/$$2 — the
      # collector expands $... as env vars, so $$ escapes to a literal $.
      prometheus:
        config:
          scrape_configs:
            - job_name: kubernetes-pods
              scrape_interval: 30s
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                  action: keep
                  regex: "true"
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                  action: replace
                  target_label: __metrics_path__
                  regex: (.+)
                - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                  action: replace
                  regex: ([^:]+)(?::\d+)?;(\d+)
                  replacement: $$1:$$2
                  target_label: __address__
                - source_labels: [__meta_kubernetes_namespace]
                  action: replace
                  target_label: namespace
                - source_labels: [__meta_kubernetes_pod_name]
                  action: replace
                  target_label: pod

    processors:
      memory_limiter:
        check_interval: 5s
        limit_percentage: 80
        spike_limit_percentage: 25
      batch:
        timeout: 10s

    exporters:
      otlphttp/metrics:
        metrics_endpoint: http://victoria-metrics.observability.svc.cluster.local:8428/opentelemetry/v1/metrics
      otlphttp/logs:
        logs_endpoint: http://victoria-logs.observability.svc.cluster.local:9428/insert/opentelemetry/v1/logs
        headers:
          VL-Stream-Fields: service.name,k8s.namespace.name

    service:
      extensions: [ health_check ]
      pipelines:
        metrics:
          receivers: [ otlp, prometheus, k8s_cluster ]
          processors: [ memory_limiter, batch ]
          exporters: [ otlphttp/metrics ]
        logs:
          receivers: [ otlp ]
          processors: [ memory_limiter, batch ]
          exporters: [ otlphttp/logs ]
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: observability
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/instance: otel-collector-gateway
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/instance: otel-collector-gateway
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector-gateway
  namespace: observability
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/instance: otel-collector-gateway
    app.kubernetes.io/version: "0.149.0"
spec:
  replicas: 1
  # Single instance on purpose: k8s_cluster must not double-count, and the
  # scrape set is tiny (a workshop cluster) — no sharding needed.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-collector
      app.kubernetes.io/instance: otel-collector-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-collector
        app.kubernetes.io/instance: otel-collector-gateway
      annotations:
        checksum/config: "stage2-v1"
    spec:
      serviceAccountName: otel-collector
      securityContext:
        runAsNonRoot: true
        # 10001 is the collector-contrib image's built-in non-root user.
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: otel-collector
          image: "docker.io/otel/opentelemetry-collector-contrib:0.149.0@sha256:0fba96233274f6d665ac8831ad99dfe6479a9a20459f6e2719c0d20945773b46"
          imagePullPolicy: IfNotPresent
          args: [ "--config=/etc/otelcol/config.yaml" ]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ ALL ]
            readOnlyRootFilesystem: true
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: health
              containerPort: 13133
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/otelcol
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: otel-collector-gateway
        - name: tmp
          emptyDir: {}
