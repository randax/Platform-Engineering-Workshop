---
# Source: rustfs/templates/serviceaccount.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rustfs
  namespace: rustfs
  labels:
    helm.sh/chart: rustfs-0.8.0
    app.kubernetes.io/name: rustfs
    app.kubernetes.io/instance: rustfs
    app.kubernetes.io/version: "1.0.0-beta.8"
    app.kubernetes.io/managed-by: Helm
automountServiceAccountToken: true
---
# Source: rustfs/templates/secret.yaml
# WORKSHOP-GRADE CREDENTIALS: cloudbox / cloudbox123, committed to git on
