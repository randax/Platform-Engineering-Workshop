---
# VictoriaLogs 1.24.0 — single-node log database (observability rework, issue #57).
# The logs half of the Victoria stack that will replace otel-lgtm's Loki.
# Listens on :9428:
#   - OTLP logs ingest → POST /insert/opentelemetry/v1/logs
#   - LogsQL query     → GET  /select/logsql/query
#   - Loki-compatible query API (used by Grafana's Loki datasource, see
#     grafana/VENDOR.md) under /select/loki/api/v1/*
# Coexists with otel-lgtm during the migration (both in namespace observability).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: victoria-logs-data
  namespace: observability
  annotations:
    # Prune=false so disabling the app doesn't wipe stored logs mid-workshop —
    # same curation as rustfs-data / nats-jetstream.
    argocd.argoproj.io/sync-options: Prune=false
  labels:
    app.kubernetes.io/name: victoria-logs
    app.kubernetes.io/instance: victoria-logs
spec:
  accessModes: [ ReadWriteOnce ]
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: victoria-logs
  namespace: observability
  labels:
    app.kubernetes.io/name: victoria-logs
    app.kubernetes.io/instance: victoria-logs
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9428
      targetPort: 9428
  selector:
    app.kubernetes.io/name: victoria-logs
    app.kubernetes.io/instance: victoria-logs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoria-logs
  namespace: observability
  labels:
    app.kubernetes.io/name: victoria-logs
    app.kubernetes.io/instance: victoria-logs
    app.kubernetes.io/version: "1.24.0"
spec:
  replicas: 1
  # Recreate (not RollingUpdate): the data PVC is ReadWriteOnce, so a second
  # pod can't attach the volume during a rollout.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: victoria-logs
      app.kubernetes.io/instance: victoria-logs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: victoria-logs
        app.kubernetes.io/instance: victoria-logs
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        # fsGroup makes kubelet chown the PVC to gid 1000 on mount, so the
        # binary writes its store under /victoria-logs-data directly (no
        # initContainer needed) — same trick as nats.
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: victoria-logs
          image: "docker.io/victoriametrics/victoria-logs:v1.24.0-victorialogs@sha256:1ec31ddccc39dc9ead2607cddbf2829be1eb5ad39890e72bba26b359be20801d"
          imagePullPolicy: IfNotPresent
          args:
            - -storageDataPath=/victoria-logs-data
            - -httpListenAddr=:9428
            # Workshop-sized retention (a 4-hour lab, not prod).
            - -retentionPeriod=7d
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ ALL ]
            # VLogs only writes the mounted data path, so the rest of the fs is
            # read-only.
            readOnlyRootFilesystem: true
          ports:
            - name: http
              containerPort: 9428
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 50m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 9428
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 9428
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /victoria-logs-data
            # VLogs writes search/sort buffers to /tmp; readOnlyRootFilesystem
            # blocks that under load (not at boot), so give it a writable emptyDir.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: victoria-logs-data
        - name: tmp
          emptyDir: {}
