# Workshop addition: in-cluster image build with rootless BuildKit, pushed to
# the in-cluster Zot registry. This modernizes the official Argo Workflows
# buildkit-template example (which predates Kaniko's death and PSA):
#   - moby/buildkit v0.31.1-rootless instead of v0.9.x
#   - explicit seccomp/AppArmor Unconfined securityContext (required because
#     rootless BuildKit needs to create user+mount namespaces; that is also
#     why the `builds` namespace is PSA-privileged — see builds.yaml)
#   - anonymous push to Zot with registry.insecure=true (plain HTTP in-cluster)
#
# Run it (module S2):
#   argo -n builds submit --from workflowtemplate/build-and-push \
#     -p repo=http://gitea-http.gitea.svc.cluster.local:3000/cloudbox/demo-app.git \
#     -p image=zot.zot.svc.cluster.local:5000/cloudbox/demo-app:v1
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: build-and-push
  namespace: builds
spec:
  entrypoint: main
  arguments:
    parameters:
      - name: repo
        # Any repo in the in-cluster Gitea; NEVER a github.com URL (offline rule).
        value: http://gitea-http.gitea.svc.cluster.local:3000/cloudbox/demo-app.git
      - name: branch
        value: main
      - name: path
        # Path inside the repo containing the Dockerfile / build context.
        value: "."
      - name: image
        # Where BuildKit pushes. The kubelet pulls it back via the NodePort /
        # Talos registry mirror configured in the machine config.
        value: zot.zot.svc.cluster.local:5000/cloudbox/demo-app:v1
  templates:
    - name: main
      dag:
        tasks:
          - name: build
            template: build
            arguments:
              parameters:
                - name: repo
                  value: "{{workflow.parameters.repo}}"
                - name: branch
                  value: "{{workflow.parameters.branch}}"
                - name: path
                  value: "{{workflow.parameters.path}}"
                - name: image
                  value: "{{workflow.parameters.image}}"

    - name: build
      inputs:
        parameters:
          - name: repo
          - name: branch
          - name: path
          - name: image
        artifacts:
          # The argoexec init container clones the source — no extra git image
          # and no artifact repository (S3) needed for git *input* artifacts.
          - name: source
            path: /src
            git:
              repo: "{{inputs.parameters.repo}}"
              revision: "{{inputs.parameters.branch}}"
              depth: 1
      container:
        image: docker.io/moby/buildkit:v0.31.1-rootless
        workingDir: /src/{{inputs.parameters.path}}
        command:
          - buildctl-daemonless.sh
        args:
          - build
          - --frontend
          - dockerfile.v0
          - --local
          - context=.
          - --local
          - dockerfile=.
          - --output
          - type=image,name={{inputs.parameters.image}},push=true,registry.insecure=true
        env:
          - name: BUILDKITD_FLAGS
            value: --oci-worker-no-process-sandbox
        securityContext:
          # Rootless BuildKit: runs as uid 1000, still needs to unshare
          # user/mount namespaces -> Unconfined seccomp + AppArmor. PSA
          # baseline forbids this; the builds namespace is privileged.
          seccompProfile:
            type: Unconfined
          appArmorProfile:
            type: Unconfined
          runAsUser: 1000
          runAsGroup: 1000
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            memory: 2Gi
