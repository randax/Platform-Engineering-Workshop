data:
  config.json: "{\n  \"storage\": { \"rootDirectory\": \"/var/lib/registry\" },\n  \"http\": {\n    \"address\": \"0.0.0.0\",\n    \"port\": \"5000\",\n    \"accessControl\": {\n      \"repositories\": {\n        \"**\": {\n          \"anonymousPolicy\": [\"read\", \"create\", \"update\", \"delete\", \"detectManifestCollision\"],\n          \"defaultPolicy\": []\n        }\n      }\n    }\n  },\n  \"log\": { \"level\": \"info\" },\n  \"extensions\": {\n    \"search\": { \"enable\": true },\n    \"ui\": { \"enable\": true }\n  }\n}"
