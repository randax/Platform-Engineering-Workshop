---
# Source: zot/templates/statefulset.yaml
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zot
  namespace: zot
  labels:
    helm.sh/chart: zot-0.1.122
    app.kubernetes.io/name: zot
    app.kubernetes.io/instance: zot
    app.kubernetes.io/version: "v2.1.18"
    app.kubernetes.io/managed-by: Helm
spec:
  serviceName: zot-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: zot
      app.kubernetes.io/instance: zot
  minReadySeconds: 10
  volumeClaimTemplates:
    - metadata:
        name: zot-pvc
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 5Gi
        storageClassName: "local-path"
  template:
    metadata:
      annotations:
        checksum/config: 560709ccd6fff6e7f7f1e4c450c73c023a8dff6cad051101537e72d1e3757eef
      labels:
        app.kubernetes.io/name: zot
        app.kubernetes.io/instance: zot
    spec:
      serviceAccountName: zot
      securityContext:
        null
      containers:
        - name: zot
          securityContext:
            null
          image: "ghcr.io/project-zot/zot:v2.1.18"
          imagePullPolicy: IfNotPresent
          env:
            null
          ports:
            - name: zot
              containerPort: 5000
              protocol: TCP
          volumeMounts:
            - mountPath: '/var/lib/registry'
              name: zot-pvc
            - mountPath: '/etc/zot'
              name: zot-config
          livenessProbe:
            initialDelaySeconds: 5
            httpGet:
              path: /livez
              port: 5000
              scheme: HTTP
          readinessProbe:
            initialDelaySeconds: 5
            httpGet:
              path: /readyz
              port: 5000
              scheme: HTTP
          startupProbe:
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            httpGet:
              path: /startupz
              port: 5000
              scheme: HTTP
          resources:
            null
      volumes:
        - name: zot-config
          configMap:
            name: zot-config
      dnsPolicy: ClusterFirst
