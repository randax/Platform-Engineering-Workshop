---
# NATS 2.12.12 + JetStream — single-node durable messaging (PRD-0001).
# Client :4222 (NodePort 30422), monitoring :8222. JetStream persists to a PVC
# so the "kill the pod, watch the stream replay" demo actually survives a restart.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  namespace: nats
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/instance: nats
data:
  nats.conf: |
    server_name: cloudbox-nats
    # client + monitoring
    port: 4222
    http_port: 8222
    # JetStream — durable streams/consumers on a persistent volume.
    # Caps kept small (workshop laptop); this is a sandbox, not production.
    jetstream {
      store_dir: "/data"
      max_memory_store: 67108864     # 64 MiB
      max_file_store: 536870912      # 512 MiB
    }
---
# JetStream store. Protected from prune so disabling the app doesn't wipe streams
# mid-workshop (same curation as rustfs-data).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nats-jetstream
  namespace: nats
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/instance: nats
spec:
  accessModes: [ ReadWriteOnce ]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: nats
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/instance: nats
spec:
  type: ClusterIP
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitor
      port: 8222
      targetPort: 8222
  selector:
    app.kubernetes.io/name: nats
    app.kubernetes.io/instance: nats
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: nats
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/instance: nats
    app.kubernetes.io/version: "2.12.12"
spec:
  replicas: 1
  # Recreate (not RollingUpdate): the JetStream PVC is RWO, so a second pod
  # can't attach the volume during a rollout.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: nats
      app.kubernetes.io/instance: nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats
        app.kubernetes.io/instance: nats
      # Opt this pod into the collector's annotation-based `kubernetes-pods`
      # scrape job (see otel-collector gateway): scrape the exporter sidecar's
      # :7777, not NATS itself — NATS core only speaks JSON on :8222, so the
      # sidecar is what turns /varz + /jsz into Prometheus metrics (Streams
      # panel, #56). gnatsd_* (server/connections) + jetstream_* (streams).
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "7777"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      # No initContainer: fsGroup:1000 makes Kubernetes chown the PVC to the nats
      # gid on mount, so JetStream can create its store under /data directly.
      containers:
        - name: nats
          image: "nats:2.12.12-alpine@sha256:2ca98656a279b2d88cfdf2b8c3f0d5d7f3941ae9dc2ab12ebaa92d83e0f4ccdb"
          imagePullPolicy: IfNotPresent
          args: ["--config", "/etc/nats/nats.conf"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ ALL ]
            readOnlyRootFilesystem: true
          ports:
            - name: client
              containerPort: 4222
            - name: monitor
              containerPort: 8222
          resources:
            limits:
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 96Mi
          # NATS monitoring endpoints (:8222): /healthz gates readiness/liveness.
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            # js-enabled-only=true → Ready only once JetStream is actually up,
            # so "deployment Ready" proves durable messaging, not just NATS core.
            httpGet:
              path: /healthz?js-enabled-only=true
              port: 8222
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /etc/nats
              readOnly: true
            - name: data
              mountPath: /data
        # prometheus-nats-exporter sidecar: polls NATS's :8222 monitoring
        # endpoints (same pod → localhost) and re-exposes them as Prometheus
        # metrics on :7777 for the collector to scrape. -jsz=all adds the
        # JetStream series (jetstream_server_total_messages / _message_bytes)
        # the Streams Monitoring panel plots; -varz/-connz add server +
        # connection gauges (gnatsd_varz_*). Digest-pinned (see scripts/images.txt);
        # the rehearsal verifies the exact metric names land in VM.
        - name: metrics
          image: "docker.io/natsio/prometheus-nats-exporter:0.17.3@sha256:26c826662ac8424597cc9bdf89ea5b606eb66e3c11db9b1215c27d2076bbb01b"
          imagePullPolicy: IfNotPresent
          args: [ "-varz", "-connz", "-jsz=all", "-port", "7777", "http://localhost:8222" ]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ ALL ]
            readOnlyRootFilesystem: true
          ports:
            - name: metrics
              containerPort: 7777
          resources:
            limits:
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 24Mi
          livenessProbe:
            httpGet:
              path: /metrics
              port: 7777
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: nats-config
        - name: data
          persistentVolumeClaim:
            claimName: nats-jetstream
