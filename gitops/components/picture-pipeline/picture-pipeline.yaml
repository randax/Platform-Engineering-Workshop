# Picture pipeline (module 09 capstone): upload → RustFS → CloudEvent →
# resize. First-party apps (apps/uploader, apps/resizer in this repo),
# event mesh from knative-eventing, storage from rustfs.
#
# Flow: portal → uploader ksvc → puts original in s3://images/ → POSTs a
# dev.cloudbox.image.uploaded CloudEvent to the Broker → Trigger delivers
# it to the resizer ksvc → resizer writes the thumbnail back to s3://images/.
#
# Requires (module order): knative-serving, knative-eventing, rustfs —
# hence SkipDryRunOnMissingResource on the Application.
apiVersion: v1
kind: Namespace
metadata:
  name: pipeline
---
# In-memory, multi-tenant channel-based Broker. The broker class annotation
# is explicit for teachability — config-br-defaults in knative-eventing
# already defaults to MTChannelBasedBroker, so a bare Broker would behave
# identically. In-memory = events are lost if the imc-dispatcher restarts;
# deliberate for a lab (no Kafka).
apiVersion: eventing.knative.dev/v1
kind: Broker
metadata:
  name: default
  namespace: pipeline
  annotations:
    eventing.knative.dev/broker.class: MTChannelBasedBroker
---
# The uploader: receives a picture (from the portal), stores the original
# in RustFS, emits a dev.cloudbox.image.uploaded CloudEvent to the Broker.
# cluster-local: reachable only inside the cluster as
# http://uploader.pipeline.svc.cluster.local (via kourier-internal) —
# never exposed on the Kourier NodePort.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: uploader
  namespace: pipeline
  labels:
    networking.knative.dev/visibility: cluster-local
spec:
  template:
    spec:
      containers:
        # Built by CI from apps/uploader (multi-arch). Must be in the
        # pre-pull list (scripts/images.txt).
        - image: ghcr.io/randax/cloudbox-uploader:v0.1.0
          env:
            # WORKSHOP-GRADE CREDENTIALS, committed on purpose (ephemeral
            # lab sandbox) — must match the rustfs component.
            - name: S3_ENDPOINT
              value: http://rustfs-svc.rustfs.svc.cluster.local:9000
            - name: S3_ACCESS_KEY
              value: cloudbox
            - name: S3_SECRET_KEY
              value: cloudbox123
            - name: S3_BUCKET
              value: images
            # The MT broker ingress URL for Broker default in ns pipeline:
            # http://broker-ingress.<eventing-ns>.svc.cluster.local/<ns>/<broker>
            - name: BROKER_URL
              value: http://broker-ingress.knative-eventing.svc.cluster.local/pipeline/default
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi
---
# The resizer: subscribes (via the Trigger below) to upload events and
# writes a resized copy back to the same bucket. Also cluster-local — only
# the Broker ever calls it.
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: resizer
  namespace: pipeline
  labels:
    networking.knative.dev/visibility: cluster-local
spec:
  template:
    spec:
      containers:
        # Built by CI from apps/resizer (multi-arch). Must be in the
        # pre-pull list (scripts/images.txt).
        - image: ghcr.io/randax/cloudbox-resizer:v0.1.0
          env:
            - name: S3_ENDPOINT
              value: http://rustfs-svc.rustfs.svc.cluster.local:9000
            - name: S3_ACCESS_KEY
              value: cloudbox
            - name: S3_SECRET_KEY
              value: cloudbox123
            - name: S3_BUCKET
              value: images
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              # Image decoding is the one memory-hungry step in the pipeline.
              memory: 256Mi
---
# Route every dev.cloudbox.image.uploaded event on the Broker to the
# resizer. Exact-match attribute filter — the classic Knative Trigger.
apiVersion: eventing.knative.dev/v1
kind: Trigger
metadata:
  name: resize-on-upload
  namespace: pipeline
spec:
  broker: default
  filter:
    attributes:
      type: dev.cloudbox.image.uploaded
  subscriber:
    ref:
      apiVersion: serving.knative.dev/v1
      kind: Service
      name: resizer
---
# One-shot, idempotent bucket setup: GitOps can carry a Job, but not an S3
# API call — same aws-cli image + head-bucket||mb pattern as
# solutions/module-03's post.sh. Generous backoff: rustfs may still be
# starting when this lands. The completed Job stays around (no TTL) so
# ArgoCD does not recreate it on every reconcile.
apiVersion: batch/v1
kind: Job
metadata:
  name: create-images-bucket
  namespace: pipeline
spec:
  backoffLimit: 20
  template:
    metadata:
      labels:
        app: create-images-bucket
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-bucket
          # Same pinned image the platform-api composition and post.sh use.
          image: public.ecr.aws/aws-cli/aws-cli:2.27.49
          command:
            - /bin/sh
            - -c
            - |
              set -e
              EP=http://rustfs-svc.rustfs.svc.cluster.local:9000
              aws --endpoint-url $EP s3api head-bucket --bucket images 2>/dev/null \
                || aws --endpoint-url $EP s3api create-bucket --bucket images
              echo "bucket images ready"
          env:
            # WORKSHOP-GRADE CREDENTIALS (see above).
            - name: AWS_ACCESS_KEY_ID
              value: cloudbox
            - name: AWS_SECRET_ACCESS_KEY
              value: cloudbox123
            - name: AWS_REGION
              value: us-east-1
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
