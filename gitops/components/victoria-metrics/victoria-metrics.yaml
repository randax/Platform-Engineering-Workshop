---
# VictoriaMetrics 1.147.0 — single-node TSDB (observability rework, issue #57).
# The metrics store of the Victoria stack that replaced otel-lgtm's Prometheus.
# Listens on :8428 for everything:
#   - OTLP metrics ingest  → POST /opentelemetry/v1/metrics
#   - Prometheus remote-write → POST /api/v1/write
#   - PromQL query        → GET  /api/v1/query
# Part of the on-demand observability capability (namespace observability).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: victoria-metrics-data
  namespace: observability
  annotations:
    # Prune=false so disabling the app (git rm + push) doesn't wipe the TSDB
    # mid-workshop — same curation as rustfs-data / nats-jetstream.
    argocd.argoproj.io/sync-options: Prune=false
  labels:
    app.kubernetes.io/name: victoria-metrics
    app.kubernetes.io/instance: victoria-metrics
spec:
  accessModes: [ ReadWriteOnce ]
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: victoria-metrics
  namespace: observability
  labels:
    app.kubernetes.io/name: victoria-metrics
    app.kubernetes.io/instance: victoria-metrics
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8428
      targetPort: 8428
  selector:
    app.kubernetes.io/name: victoria-metrics
    app.kubernetes.io/instance: victoria-metrics
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoria-metrics
  namespace: observability
  labels:
    app.kubernetes.io/name: victoria-metrics
    app.kubernetes.io/instance: victoria-metrics
    app.kubernetes.io/version: "1.147.0"
spec:
  replicas: 1
  # Recreate (not RollingUpdate): the data PVC is ReadWriteOnce, so a second
  # pod can't attach the volume during a rollout.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: victoria-metrics
      app.kubernetes.io/instance: victoria-metrics
  template:
    metadata:
      labels:
        app.kubernetes.io/name: victoria-metrics
        app.kubernetes.io/instance: victoria-metrics
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        # fsGroup makes kubelet chown the PVC to gid 1000 on mount, so the
        # binary writes its TSDB under /victoria-metrics-data directly (no
        # initContainer needed) — same trick as nats.
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: victoria-metrics
          image: "docker.io/victoriametrics/victoria-metrics:v1.147.0@sha256:40ea45a6d14b6ad9f2f1fff597309d456ff9885d77d8d1da5fd559b251db9987"
          imagePullPolicy: IfNotPresent
          args:
            - -storageDataPath=/victoria-metrics-data
            - -httpListenAddr=:8428
            # Workshop-sized retention (a 4-hour lab, not prod).
            - -retentionPeriod=1
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ ALL ]
            # VM only writes the mounted data path, so the rest of the fs is
            # read-only.
            readOnlyRootFilesystem: true
          ports:
            - name: http
              containerPort: 8428
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 50m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8428
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /victoria-metrics-data
            # VM writes merge parts + query buffers to /tmp; readOnlyRootFilesystem
            # blocks that under load (not at boot), so give it a writable emptyDir.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: victoria-metrics-data
        - name: tmp
          emptyDir: {}
