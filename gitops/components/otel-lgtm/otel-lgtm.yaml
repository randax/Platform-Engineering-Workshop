# otel-lgtm — single-pod observability stack for the workshop.
# OTel Collector + Prometheus + Loki + Tempo + Grafana in one container.
# Adapted from grafana/docker-otel-lgtm k8s/lgtm.yaml (see VENDOR.md).
apiVersion: v1
kind: Service
metadata:
  name: lgtm
  namespace: observability
  labels:
    app: lgtm
spec:
  selector:
    app: lgtm
  # NodePort so the browser can reach Grafana directly (portal deep-links,
  # module 09's trace hunt). Anonymous auth is on — workshop-grade.
  type: NodePort
  ports:
    - name: grafana
      protocol: TCP
      port: 3000
      targetPort: 3000
      nodePort: 30030
    - name: otlp-grpc
      protocol: TCP
      port: 4317
      targetPort: 4317
    - name: otlp-http
      protocol: TCP
      port: 4318
      targetPort: 4318
    - name: prometheus
      protocol: TCP
      port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lgtm
  namespace: observability
  labels:
    app: lgtm
spec:
  replicas: 1
  # Single writable state, no HA needed for a lab.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: lgtm
  template:
    metadata:
      labels:
        app: lgtm
    spec:
      containers:
        - name: lgtm
          image: docker.io/grafana/otel-lgtm:0.29.0
          imagePullPolicy: IfNotPresent
          env:
            # The image enables Grafana anonymous access (org role Admin) by
            # default; we pin it explicitly so the workshop behaviour is
            # obvious and survives upstream default changes.
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Admin
            - name: GF_AUTH_DISABLE_LOGIN_FORM
              value: "true"
          ports:
            - containerPort: 3000
            - containerPort: 4317
            - containerPort: 4318
            - containerPort: 9090
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              memory: 2Gi
          readinessProbe:
            exec:
              command:
                - cat
                - /tmp/ready
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: tempo-data
              mountPath: /data/tempo
            - name: grafana-data
              mountPath: /data/grafana
            - name: loki-data
              mountPath: /data/loki
            - name: loki-storage
              mountPath: /loki
            - name: p8s-storage
              mountPath: /data/prometheus
            - name: pyroscope-storage
              mountPath: /data/pyroscope
      volumes:
        # Ephemeral on purpose: observability data does not need to survive a
        # pod restart in a 4-hour workshop, and it keeps the PVC budget low.
        - name: tempo-data
          emptyDir: {}
        - name: loki-data
          emptyDir: {}
        - name: grafana-data
          emptyDir: {}
        - name: loki-storage
          emptyDir: {}
        - name: p8s-storage
          emptyDir: {}
        - name: pyroscope-storage
          emptyDir: {}
