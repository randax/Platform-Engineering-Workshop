# Zot v2.1.18 OCI registry (module S2: in-cluster builds push here).
# Anonymous read/write (workshop-grade). UI + API on NodePort
# http://localhost:30500, in-cluster zot.zot.svc.cluster.local:5000.
#
# Enable with:  cp gitops/catalog/zot.yaml gitops/apps/ && git add . && git commit -m 'enable zot' && git push
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: zot
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: http://gitea-http.gitea.svc.cluster.local:3000/cloudbox/platform.git
    targetRevision: main
    path: gitops/components/zot
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: zot
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
