# VictoriaMetrics 1.147.0 — single-node TSDB (observability rework, issue #57).
# Metrics backend for the Victoria stack: OTLP ingest at :8428
# /opentelemetry/v1/metrics, Prometheus remote-write /api/v1/write, PromQL
# /api/v1/query. In-cluster: victoria-metrics.observability.svc:8428.
# Sync-wave 0 (a storage backend). Part of the on-demand observability capability.
#
# Enable with:  cp gitops/catalog/victoria-metrics.yaml gitops/apps/ && git add . && git commit -m 'enable victoria-metrics' && git push
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-metrics
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: http://gitea-http.gitea.svc.cluster.local:3000/cloudbox/platform.git
    targetRevision: main
    path: gitops/components/victoria-metrics
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
