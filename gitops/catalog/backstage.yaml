# Backstage portal, CNOE prebuilt image (module S3 — run LAST: heaviest
# component, ~2GB image + a CNPG Postgres). Guest sign-in, wired to the
# in-cluster Gitea and ArgoCD. UI: http://localhost:30700
# Requires cnpg-operator to be enabled first (its database is a CNPG
# Cluster — hence SkipDryRunOnMissingResource).
#
# Enable with:  cp gitops/catalog/backstage.yaml gitops/apps/ && git add . && git commit -m 'enable backstage' && git push
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: http://gitea-http.gitea.svc.cluster.local:3000/cloudbox/platform.git
    targetRevision: main
    path: gitops/components/backstage
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: backstage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
