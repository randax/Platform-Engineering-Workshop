# =============================================================================
# CloudBox — JavaZone 2026: Cloud on Your Terms
#
# Tool pins for the workshop. Everything is pinned (principle 14) — versions
# verified 2026-07-13, re-verify late August. Keep in sync with
# scripts/versions.env when bumping.
#
#   mise install        # install all tools below
#   mise tasks ls       # list workshop tasks
# =============================================================================

[tools]
# Talos v1.13.6 — never 1.12.x (cni:none docker clusters hang, talos#12885)
"aqua:siderolabs/talos" = "1.13.6"
# kubectl matches the Kubernetes version Talos v1.13.6 ships
kubectl = "1.36.2"
helm = "3.21.3"
# kind — only for scripts/kind-fallback.sh
kind = "0.32.0"
# crane — copies pinned images into the local mirror preserving digests
crane = "0.21.7"
# node — only for the Slidev presentation
node = "24"

# =============================================================================
# Attendee flow (see scripts/README.md)
# =============================================================================

[tasks.setup]
description = "🧰 Install workshop tools (mise) and verify them"
run = "./scripts/dev-setup.sh"

[tasks.init]
description = "📦 Pre-pull all pinned images + start the local registry mirror (run at home!)"
run = "./scripts/cloudbox-init.sh"

[tasks.preflight]
description = "🩺 Pre-flight check: Docker, resources, tools, pre-pulled images"
run = "./scripts/install.sh --check"

[tasks."cluster:create"]
description = "🚀 Create the Talos-in-Docker cluster and install Cilium"
run = "./scripts/create-cluster.sh"

[tasks."cluster:destroy"]
description = "💥 Destroy the Talos cluster (keeps the image mirror)"
run = "./scripts/destroy-cluster.sh"

[tasks."cluster:fallback"]
description = "🛟 Fallback: kind cluster + Cilium (if Talos-in-Docker fails)"
run = "./scripts/kind-fallback.sh"

[tasks."gitops:bootstrap"]
description = "🔁 Install Gitea + ArgoCD into the cluster (module 2)"
run = "./scripts/bootstrap-gitops.sh"

[tasks."gitops:seed"]
description = "🌱 Push this repo to the in-cluster Gitea (push-to-create)"
run = "./scripts/seed-gitea.sh"

[tasks.status]
description = "📋 Show cluster, ArgoCD app and platform pod status"
run = [
  "echo '=== Nodes ==='",
  "kubectl get nodes -o wide",
  "echo '=== ArgoCD Applications ==='",
  "kubectl get applications -n argocd 2>/dev/null || echo 'ArgoCD not installed (run gitops:bootstrap)'",
  "echo '=== Platform pods ==='",
  "kubectl get pods -A",
]

# =============================================================================
# Presentation (Slidev)
# =============================================================================

[tasks."slides:dev"]
description = "🎤 Start Slidev presentation in development mode"
run = "cd slides && npm run dev"

[tasks."slides:build"]
description = "📦 Build Slidev presentation for production"
run = "cd slides && npm run build"

[tasks."slides:export"]
description = "📄 Export slides to PDF"
run = "cd slides && npm run export"

[tasks."slides:presenter"]
description = "🎯 Start presenter mode for workshop"
run = "cd slides && npm run dev -- --presenter"

# =============================================================================
# Utility
# =============================================================================

[tasks.help]
description = "❓ Show all available tasks"
run = "mise tasks ls"
