# =============================================================================
# build-images — vet/test then build+push the three workshop apps to GHCR.
#
# Multi-arch (amd64 for most laptops, arm64 for Apple Silicon) because
# attendees run these images locally in Talos-in-Docker. Everything the
# workshop pulls comes from GHCR with pinned tags (offline rule), so this
# workflow is the only producer of:
#
#   ghcr.io/randax/cloudbox-portal    ghcr.io/randax/cloudbox-uploader
#   ghcr.io/randax/cloudbox-resizer
#
# Tagging discipline (deliberately no `latest` anywhere):
#   - every build pushes the git SHA tag (traceable, immutable);
#   - the pinned :v<version> tag is published only for a real release — normally
#     driven by release-please via workflow_call (see release-please.yaml), with
#     a manual `apps-v*` tag push kept as an escape hatch. A plain branch push
#     builds but does NOT push a version tag the manifests pin.
# =============================================================================
name: Build app images

on:
  # Primary release path: release-please calls this after cutting a release,
  # passing the version to publish as the pinned :v<version> tag.
  workflow_call:
    inputs:
      version:
        description: "Release version without the v (e.g. 0.1.0) — publishes :v<version>"
        type: string
        required: true
  push:
    branches: [main, master]
    tags: ["apps-v*"]
    paths:
      - "apps/**"
      - ".github/workflows/build-images.yaml"
  # PRs get vet+test (no push) so a broken app can't merge green.
  pull_request:
    paths:
      - "apps/**"
      - ".github/workflows/build-images.yaml"
  # Escape hatch: tag pushes combined with path filters can be finicky, and
  # sometimes you just need to rebuild.
  workflow_dispatch:

# Serialize runs per ref so an old build can't finish last and overwrite a
# newer tag push out of order.
concurrency:
  group: build-images-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    name: Vet and test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [portal, uploader, resizer]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    # GOTOOLCHAIN=local: build with EXACTLY this toolchain, never auto-download
    # a newer one. This matches the golang:1.25-alpine Dockerfile, so if a dep
    # bump raises a go.mod `go` directive past 1.25, THIS job fails loudly on the
    # PR — instead of silently downloading the toolchain and green-lighting an
    # image build that will then break (which is exactly how x/net 0.55 slipped
    # the directive to 1.25 under a 1.24 base image).
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: apps/${{ matrix.app }}/go.sum

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -count=1 ./...

  build:
    name: Build and push
    runs-on: ubuntu-latest
    needs: test
    # Never push images from PRs — the test job above is their whole gate.
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        # grafana is a build-only image (stock Grafana + native VictoriaMetrics
        # plugins baked in, #65) — no Go code, so it's not in the `test` matrix.
        app: [portal, uploader, resizer, grafana]
    steps:
      - uses: actions/checkout@v7

      # QEMU gives the amd64 runner an arm64 emulator; buildx drives the
      # multi-platform build.
      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        env:
          # release-please passes 0.1.0; a manual apps-v0.1.0 tag yields the same.
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          IMG="ghcr.io/randax/cloudbox-${{ matrix.app }}"
          TAGS="${IMG}:${{ github.sha }}"
          VERSION=""
          if [[ -n "${INPUT_VERSION}" ]]; then
            VERSION="v${INPUT_VERSION}"                 # release-please (workflow_call)
          elif [[ "${GITHUB_REF}" == refs/tags/apps-v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/apps-}"      # manual tag escape hatch → vX.Y.Z
          fi
          # A version tag is published only for a real release; a plain branch
          # push builds (validates the Dockerfile) but pushes nothing.
          if [[ -n "${VERSION}" ]]; then
            TAGS="${TAGS},${IMG}:${VERSION}"
          fi
          echo "tags=${TAGS}" >> "${GITHUB_OUTPUT}"
          echo "publish=$([[ -n "${VERSION}" ]] && echo true || echo false)" >> "${GITHUB_OUTPUT}"

      - uses: docker/build-push-action@v7
        with:
          context: apps/${{ matrix.app }}
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.tags.outputs.publish }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max
