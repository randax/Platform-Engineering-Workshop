# =============================================================================
# build-images — vet/test then build+push the three workshop apps to GHCR.
#
# Multi-arch (amd64 for most laptops, arm64 for Apple Silicon) because
# attendees run these images locally in Talos-in-Docker. Everything the
# workshop pulls comes from GHCR with pinned tags (offline rule), so this
# workflow is the only producer of:
#
#   ghcr.io/randax/cloudbox-portal    ghcr.io/randax/cloudbox-uploader
#   ghcr.io/randax/cloudbox-resizer
#
# each tagged with APP_VERSION and the exact git SHA. Deliberately no
# `latest` tag: nothing in this repo may reference a floating tag.
# =============================================================================
name: Build app images

on:
  push:
    branches: [main, master]
    tags: ["apps-v*"]
    paths:
      - "apps/**"
      - ".github/workflows/build-images.yaml"
  # Escape hatch: tag pushes combined with path filters can be finicky, and
  # sometimes you just need to rebuild.
  workflow_dispatch:

env:
  # Bump together with the image tags referenced in the gitops manifests.
  APP_VERSION: v0.1.0

permissions:
  contents: read

jobs:
  test:
    name: Vet and test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [portal, uploader, resizer]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: apps/${{ matrix.app }}/go.sum

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

  build:
    name: Build and push
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        app: [portal, uploader, resizer]
    steps:
      - uses: actions/checkout@v4

      # QEMU gives the amd64 runner an arm64 emulator; buildx drives the
      # multi-platform build.
      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.app }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/randax/cloudbox-${{ matrix.app }}:${{ env.APP_VERSION }}
            ghcr.io/randax/cloudbox-${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max
