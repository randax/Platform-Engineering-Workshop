# =============================================================================
# Deploy the Slidev deck to GitHub Pages on every slides/ change on main.
# Base path is derived from the repo name, so repo renames are a non-event.
# Pages source must be set to "GitHub Actions" (Settings -> Pages) once.
# =============================================================================
name: Publish slides

on:
  push:
    branches: [main]
    paths: ['slides/**', '.github/workflows/slides.yaml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: slides-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: slides/package-lock.json
      - name: Build deck
        working-directory: slides
        run: |
          npm ci
          npx slidev build --base "/${{ github.event.repository.name }}/"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v5
        with:
          path: slides/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
