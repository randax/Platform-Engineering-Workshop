# =============================================================================
# Weekly full-bootstrap test — the complete attendee venue flow on a runner.
#
# Runner sizing PROVEN: the full core path (create → bootstrap → seed →
# modules 01-05 solve+verify) runs green on ubuntu-latest (4 vCPU/16 GB).
# ubuntu-latest for public repos is 4 vCPU / 16 GB RAM. The cluster asks for
# 4 GB (controlplane) + 6 GB (worker) container memory limits plus Cilium,
# Gitea and ArgoCD on top — this *should* fit, but nobody has proven it.
# Until a green run is observed, the whole job is continue-on-error so a
# failure here never blocks pushes. Once it's proven, remove
# continue-on-error and let drift break OUR build, not the workshop
# (principle 14). If it genuinely doesn't fit, options: larger hosted
# runners, a self-hosted runner, or a nightly run on a workshop laptop.
# =============================================================================
name: Bootstrap test

on:
  workflow_dispatch:
  schedule:
    # Weekly, Monday 03:17 UTC (odd minute to dodge cron rush)
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  full-bootstrap:
    name: create-cluster → bootstrap-gitops → seed-gitea
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
        with:
          # seed-gitea.sh pushes this checkout into the in-cluster Gitea,
          # which rejects shallow pushes ("shallow update not allowed").
          fetch-depth: 0

      - name: Show runner resources
        run: |
          nproc
          free -h
          df -h /
          docker info | grep -E 'CPUs|Total Memory'

      - name: Install mise + pinned tools
        run: |
          set -euo pipefail
          source scripts/versions.env
          curl -fsSL https://mise.run | MISE_VERSION="${MISE_VERSION}" sh
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          echo "${HOME}/.local/share/mise/shims" >> "${GITHUB_PATH}"
          "${HOME}/.local/bin/mise" trust
          "${HOME}/.local/bin/mise" install

      - name: Pre-flight (informational — no pre-pulled images on a runner)
        run: ./scripts/install.sh --check || true

      - name: Create cluster (Talos + Cilium)
        run: ./scripts/create-cluster.sh

      - name: Bootstrap GitOps (Gitea + ArgoCD)
        run: ./scripts/bootstrap-gitops.sh

      - name: Seed Gitea
        run: ./scripts/seed-gitea.sh

      - name: Smoke tests
        run: |
          set -euo pipefail
          kubectl get nodes -o wide
          kubectl get pods -A
          # Gitea answers and the platform repo exists
          curl -fsS http://localhost:30300/api/healthz
          curl -fsS http://localhost:30300/api/v1/repos/cloudbox/platform | head -c 400
          # ArgoCD UI answers on the NodePort
          curl -fsS -o /dev/null http://localhost:30080
          # Root application exists
          kubectl get application platform -n argocd -o wide


      - name: "Modules 01-05: solve then verify (rehearsal-in-CI)"
        run: |
          set -euo pipefail
          # Module 00 is skipped: it checks the pre-pulled local mirror, which
          # a runner deliberately does not have (preflight above covers it
          # informationally). Modules 01-05 are the core attendee path.
          # 06 (Knative) and 07 (BuildKit->Zot) don't use the first-party
          # cloudbox images, so they can rehearse before issue #7 publishes
          # them. 08 (portal) and 09 (pipeline) do — added once #7 lands.
          for m in lab/01-*/ lab/02-*/ lab/03-*/ lab/04-*/ lab/05-*/ lab/06-*/ lab/07-*/; do
            name="$(basename "${m}")"
            echo "::group::${name} solve.sh"
            "./${m}solve.sh"
            echo "::endgroup::"
            echo "::group::${name} verify.sh"
            "./${m}verify.sh"
            echo "::endgroup::"
          done

      - name: "Full-stack resource snapshot (issue #8 — RAM measurement)"
        if: always()
        run: |
          echo "== TRUE working set per node (kubelet summary API — excludes reclaimable cache) =="
          for n in $(kubectl get nodes -o name | sed 's|node/||'); do
            kubectl get --raw "/api/v1/nodes/$n/proxy/stats/summary" 2>/dev/null \
              | jq -r --arg n "$n" '"  \($n): workingSet \(.node.memory.workingSetBytes/1048576|floor) MiB   usage-incl-cache \(.node.memory.usageBytes/1048576|floor) MiB"' \
              || echo "  summary unavailable for $n"
          done
          echo "== top 15 pods by working set =="
          for n in $(kubectl get nodes -o name | sed 's|node/||'); do
            kubectl get --raw "/api/v1/nodes/$n/proxy/stats/summary" 2>/dev/null \
              | jq -r '.pods[] | "\(.memory.workingSetBytes // 0) \(.podRef.namespace)/\(.podRef.name)"'
          done | sort -rn | head -15 | awk '{printf "  %6.0f MiB  %s\n", $1/1048576, $2}'
          echo "== docker stats (MemUsage INCLUDES reclaimable page cache — NOT the real floor) =="
          docker stats --no-stream --format 'table {{.Name}}\t{{.MemUsage}}' || true
          echo "== host =="; free -h

      - name: Collect diagnostics
        if: always()
        run: |
          mkdir -p /tmp/diag
          docker ps -a > /tmp/diag/docker-ps.txt 2>&1 || true
          kubectl get nodes -o wide > /tmp/diag/nodes.txt 2>&1 || true
          kubectl get pods -A -o wide > /tmp/diag/pods.txt 2>&1 || true
          kubectl get events -A --sort-by=.lastTimestamp > /tmp/diag/events.txt 2>&1 || true
          kubectl -n argocd get applications -o yaml > /tmp/diag/applications.yaml 2>&1 || true
          kubectl get clusters.postgresql.cnpg.io -A > /tmp/diag/cnpg.txt 2>&1 || true
          for ns in kube-system argocd gitea cnpg-system rustfs crossplane-system demo; do
            kubectl -n "$ns" logs --tail=200 -l app --prefix > "/tmp/diag/logs-$ns.txt" 2>&1 || true
          done

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-diagnostics
          path: /tmp/diag/
          retention-days: 14

      - name: Diagnostics on failure
        if: failure()
        run: |
          docker ps -a || true
          kubectl get pods -A || true
          kubectl get events -A --sort-by=.lastTimestamp | tail -50 || true
          kubectl -n argocd get applications -o yaml || true
