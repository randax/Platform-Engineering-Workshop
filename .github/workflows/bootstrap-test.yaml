# =============================================================================
# Full rehearsal — the complete attendee flow, ALL labs, on a runner.
#
# Self-contained: the three first-party images (portal/uploader/resizer) are
# BUILT here and served from a local cloudbox-mirror, so modules 08-09 run
# without depending on the published GHCR images (issue #7). This also proves
# the image builds and the Talos registry-mirror path every run.
#
# Results are summarized as a per-module PASS/FAIL + timing table on the run's
# Summary page (no log-grepping); a diagnostics artifact is uploaded either way.
#
# Runner: ubuntu-latest (4 vCPU / 16 GB). The core path (01-07) is proven green.
# =============================================================================
name: Bootstrap test

on:
  workflow_dispatch:
  schedule:
    # Weekly, Monday 03:17 UTC (odd minute to dodge cron rush)
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  full-bootstrap:
    name: full rehearsal — all labs (01-09)
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v7
        with:
          # seed-gitea.sh pushes this checkout into the in-cluster Gitea,
          # which rejects shallow pushes ("shallow update not allowed").
          fetch-depth: 0

      - name: Show runner resources
        run: |
          nproc; free -h; df -h /
          docker info | grep -E 'CPUs|Total Memory'

      - name: Install mise + pinned tools
        run: |
          set -euo pipefail
          source scripts/versions.env
          curl -fsSL https://mise.run | MISE_VERSION="${MISE_VERSION}" sh
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          echo "${HOME}/.local/share/mise/shims" >> "${GITHUB_PATH}"
          "${HOME}/.local/bin/mise" trust
          "${HOME}/.local/bin/mise" install

      - name: Build first-party images into the cloudbox-mirror (self-contained)
        run: |
          set -euo pipefail
          source scripts/versions.env
          # Start the registry create-cluster expects (named ${MIRROR_NAME} so
          # mirror_running detects it). Talos nodes reach it at the bridge
          # gateway; skipFallback:false means everything NOT here falls back
          # upstream, so the mirror only needs the three first-party images.
          docker run -d --name "${MIRROR_NAME}" --restart unless-stopped \
            -p "${MIRROR_PORT}:5000" "${MIRROR_IMAGE}"
          for _ in $(seq 1 30); do
            curl -fsS "http://localhost:${MIRROR_PORT}/v2/" >/dev/null 2>&1 && break
            sleep 1
          done
          # Build + push each app under the SAME repo path the gitops manifests
          # request (ghcr.io/randax/cloudbox-*), so the node's mirror lookup hits.
          # localhost push is insecure-by-default in Docker — no daemon config.
          for app in portal uploader resizer grafana; do
            ref="localhost:${MIRROR_PORT}/randax/cloudbox-${app}:v0.1.0"
            echo "::group::build cloudbox-${app}"
            docker build -t "${ref}" "apps/${app}"
            docker push "${ref}"
            echo "::endgroup::"
          done

      - name: Create cluster (Talos + Cilium, wired to the mirror)
        run: ./scripts/create-cluster.sh

      - name: Bootstrap GitOps (Gitea + ArgoCD)
        run: ./scripts/bootstrap-gitops.sh

      - name: Seed Gitea
        run: ./scripts/seed-gitea.sh

      - name: Smoke tests
        run: |
          set -euo pipefail
          kubectl get nodes -o wide
          curl -fsS http://localhost:30300/api/healthz
          curl -fsS -o /dev/null http://localhost:30080
          kubectl get application platform -n argocd -o wide

      - name: Run ALL labs (01-09) — solve + verify, with a results table
        id: labs
        run: |
          set -uo pipefail   # NOT -e: capture every module's result, then exit
          sum="${GITHUB_STEP_SUMMARY}"
          {
            echo "## Rehearsal results — all labs"
            echo ""
            echo "Module 00 is skipped (it checks the at-home pre-pull mirror a runner has no reason to hold)."
            echo ""
            echo "| Module | solve | verify | duration |"
            echo "|---|---|---|---|"
          } >> "$sum"
          overall=0
          for m in lab/01-*/ lab/02-*/ lab/03-*/ lab/04-*/ lab/05-*/ \
                   lab/06-*/ lab/07-*/ lab/08-*/ lab/09-*/; do
            name="$(basename "${m}")"
            t0=$(date +%s)
            sres="❌"; vres="—"
            echo "::group::${name} solve.sh"
            if "./${m}solve.sh"; then
              sres="✅"; echo "::endgroup::"; echo "::group::${name} verify.sh"
              if "./${m}verify.sh"; then vres="✅"; else vres="❌"; fi
            fi
            echo "::endgroup::"
            dt=$(( $(date +%s) - t0 ))
            printf '| %s | %s | %s | %ds |\n' "$name" "$sres" "$vres" "$dt" >> "$sum"
            # Rehearsal hygiene: module 05's fault namespaces are spent once 05
            # passes — restore.sh 'all' FIXES the faults in place but leaves them
            # RUNNING (only 'clean' deletes them). On a single-worker runner
            # their ~1 GiB piles onto the module-09 full-stack peak and tips the
            # node into NodeNotReady. Tear them down here (the workshop keeps its
            # own 'restore.sh clean' path) so module 09 has headroom.
            if [ "$sres" = "✅" ] && [ "$vres" = "✅" ] && [[ "$name" == 05-* ]]; then
              echo "::group::teardown spent faultlab namespaces"
              kubectl delete ns faultlab-01 faultlab-02 faultlab-03 faultlab-04 \
                --ignore-not-found --wait=true --timeout=150s || true
              echo "::endgroup::"
            fi
            if [ "$sres" != "✅" ] || [ "$vres" != "✅" ]; then
              overall=1
              echo "| _remaining modules skipped (state is cumulative)_ | | | |" >> "$sum"
              break
            fi
          done
          echo "" >> "$sum"
          if [ "$overall" -eq 0 ]; then
            echo "**All labs passed. ✅**" >> "$sum"
          else
            echo "**A module failed — see the table + diagnostics artifact. ❌**" >> "$sum"
          fi
          exit "$overall"

      - name: Verify NATS (PRD-0001) enables + JetStream boots
        run: |
          set -euo pipefail
          # shellcheck source=../../lab/common.sh
          source lab/common.sh
          CLONE="$(gitops_clone)"
          enable_catalog "$CLONE" nats.yaml
          gitops_push "$CLONE" "verify: enable nats"
          wait_app nats
          # Readiness gates on /healthz?js-enabled-only=true, so Ready == JetStream up.
          kubectl -n nats rollout status deploy/nats --timeout=180s
          echo "✅ NATS + JetStream reached Ready — durable messaging boots offline"
          {
            echo ""
            echo "### NATS + JetStream (PRD-0001)"
            echo "Enabled from the catalog and reached Ready (readiness gates on JetStream). ✅"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Verify golden-path Application XR (PRD-0003)
        run: |
          set -euo pipefail
          # shellcheck source=../../lab/common.sh
          source lab/common.sh
          CLONE="$(gitops_clone)"
          enable_catalog "$CLONE" application-xr.yaml
          gitops_push "$CLONE" "verify: enable application-xr"
          wait_app application-xr
          # One manifest → a whole app: create it in ns demo (where Crossplane
          # composes), then prove the XR reaches Ready — which means the composed
          # Knative Service + WorkshopDatabase (composition-of-compositions) +
          # bucket all came up and the secret wiring resolved.
          kubectl -n demo apply -f lab/04-self-service/examples/my-application.yaml
          kubectl -n demo wait --for=condition=Ready \
            application.platform.cloudbox.io/my-app --timeout=600s
          kubectl -n demo get ksvc my-app
          echo "✅ golden-path Application XR composed a running app + DB + bucket"
          {
            echo ""
            echo "### Golden-path Application XR (PRD-0003)"
            echo "One \`Application\` manifest composed a Knative workload + CNPG database + bucket. ✅"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Verify observability v2 (Victoria stack, #57) boots
        run: |
          set -euo pipefail
          # shellcheck source=../../lab/common.sh
          source lab/common.sh
          CLONE="$(gitops_clone)"
          enable_catalog "$CLONE" victoria-metrics.yaml victoria-logs.yaml victoria-traces.yaml grafana.yaml
          gitops_push "$CLONE" "verify: enable victoria stack"
          wait_app victoria-metrics
          wait_app victoria-logs
          wait_app victoria-traces
          wait_app grafana
          for d in victoria-metrics victoria-logs victoria-traces grafana; do
            kubectl -n observability rollout status "deploy/$d" --timeout=180s
          done
          echo "✅ Victoria stack + Grafana booted (metrics + logs + traces backends + dashboards)"
          {
            echo ""
            echo "### Observability v2 — Victoria stack (#57)"
            echo "VictoriaMetrics + VictoriaLogs + VictoriaTraces + Grafana enabled from the catalog and reached Ready. ✅"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Verify observability v2 collection (OTel Collector → VM/VLogs/VTraces, #57)
        run: |
          set -euo pipefail
          # shellcheck source=../../lab/common.sh
          source lab/common.sh
          # otel-collector is enabled the SAME gitops way as the Victoria stack
          # above (cp catalog → apps → push → the app-of-apps renders it) — that
          # flow is already proven by those apps in this very run. otel-collector
          # is the last and heaviest catalog enable, and under CI load the
          # app-of-apps was intermittently slow to render THIS child, so the wait
          # flaked. Earlier attempts made it worse: pushing to git AND applying
          # directly gave it two owners → a stuck "Unknown Progressing".
          # Fix: give it a SINGLE owner. Apply the catalog Application directly —
          # it carries its own automated syncPolicy, so it self-syncs from
          # gitops/components/otel-collector. No gitops push here → no app-of-apps
          # race, no dual ownership. wait_app gates on it actually going Healthy.
          kubectl apply -f gitops/catalog/otel-collector.yaml
          wait_app otel-collector 600
          kubectl -n observability rollout status deploy/otel-collector-gateway --timeout=180s
          kubectl -n observability rollout status ds/otel-collector-agent --timeout=180s

          # Reach the ClusterIP backends from the runner via port-forward.
          kubectl -n observability port-forward svc/victoria-metrics 18428:8428 >/dev/null 2>&1 &
          vmpf=$!
          kubectl -n observability port-forward svc/victoria-logs 19428:9428 >/dev/null 2>&1 &
          vlpf=$!
          kubectl -n observability port-forward svc/victoria-traces 10428:10428 >/dev/null 2>&1 &
          vtpf=$!
          trap 'kill $vmpf $vlpf $vtpf 2>/dev/null || true' EXIT
          for _ in $(seq 1 15); do curl -fsS http://localhost:18428/health >/dev/null 2>&1 && break; sleep 1; done
          for _ in $(seq 1 15); do curl -fsS http://localhost:19428/health >/dev/null 2>&1 && break; sleep 1; done
          for _ in $(seq 1 15); do curl -fsS http://localhost:10428/health >/dev/null 2>&1 && break; sleep 1; done

          # --- metrics proof: a non-app COMPONENT metric must reach VM. k8s_*
          # series come ONLY from kubeletstats + k8s_cluster (platform infra,
          # not the 3 first-party apps) — their presence IS the gap closing.
          # Poll: first scrape (30s) + batch (10s) + export need a moment.
          # k8s[._] tolerates either VM naming mode: default keeps OTLP dots
          # (k8s.pod...), -opentelemetry.usePrometheusNaming maps them to
          # underscores (k8s_pod...). Match both so the proof is naming-agnostic.
          metrics=0
          for _ in $(seq 1 24); do
            metrics=$(curl -fsS -G http://localhost:18428/api/v1/query \
              --data-urlencode 'query=count({__name__=~"k8s[._].+"})' \
              | jq -r '.data.result[0].value[1] // "0"')
            [ "${metrics:-0}" -gt 0 ] 2>/dev/null && break
            sleep 5
          done
          echo "VM k8s_* series = ${metrics}"
          [ "${metrics:-0}" -gt 0 ] 2>/dev/null || { echo "❌ no component metrics in VM"; exit 1; }

          # CNPG scrape (#56 Databases panel): the collector's `cnpg` scrape job
          # must pull Postgres metrics from the app-db instance's :9187. cnpg_*
          # series in VM prove the component-/metrics scraping path works.
          cnpg=0
          for _ in $(seq 1 24); do
            cnpg=$(curl -fsS -G http://localhost:18428/api/v1/query \
              --data-urlencode 'query=count({__name__=~"cnpg_.+"})' \
              | jq -r '.data.result[0].value[1] // "0"')
            [ "${cnpg:-0}" -gt 0 ] 2>/dev/null && break
            sleep 5
          done
          echo "VM cnpg_* series = ${cnpg}"
          [ "${cnpg:-0}" -gt 0 ] 2>/dev/null || { echo "❌ CNPG /metrics not scraped into VM"; exit 1; }
          echo "✅ CNPG metrics scraped into VictoriaMetrics (Databases panel data source)"
          # Ground-truth the exact cnpg_* names/labels + assert the THREE the
          # Databases panel queries (connections/transactions/size) exist, and
          # that the cnpg_cluster label (from the scrape relabel) is present.
          echo "--- cnpg_* names in VM (sample) ---"
          curl -fsS "http://localhost:18428/api/v1/label/__name__/values" 2>/dev/null \
            | jq -r '.data[]?' | grep -E '^cnpg_' | sort | head -40 || true
          echo "--- cnpg_backends_total label set ---"
          curl -fsS -G "http://localhost:18428/api/v1/series" \
            --data-urlencode 'match[]=cnpg_backends_total' 2>/dev/null | jq -c '.data[0] // "none"' || true
          for m in cnpg_backends_total cnpg_cache_hits cnpg_cache_miss cnpg_pg_database_size_bytes; do
            n=$(curl -fsS -G http://localhost:18428/api/v1/query --data-urlencode "query=count($m)" 2>/dev/null | jq -r '.data.result[0].value[1] // "0"')
            echo "  $m → ${n} series"
            [ "${n:-0}" -gt 0 ] 2>/dev/null || { echo "❌ Databases-panel metric $m absent"; exit 1; }
          done
          echo "✅ CNPG panel metrics present (connections / cache-hit / size)"

          # Builds panel (#56): Argo v4's controller doesn't expose scrapeable
          # Prometheus metrics, so — like Buckets/RustFS — the panel uses the
          # generic per-namespace kubeletstats signal (BuildKit's CPU/mem in the
          # builds namespace). Soft-report the builds-scoped series so the panel
          # has data. (The dump stays useful if a future Argo version does emit
          # argo_* — surface whatever landed.)
          echo "--- argo_* names in VM (if any) ---"
          curl -fsS "http://localhost:18428/api/v1/label/__name__/values" 2>/dev/null \
            | jq -r '.data[]?' | grep -E '^argo_' | sort | head -40 || echo "(none — expected for Argo v4)"
          bf=$(curl -fsS -G http://localhost:18428/api/v1/query --data-urlencode 'query=sum(k8s_pod_cpu_usage{k8s_namespace_name="builds"})' 2>/dev/null | jq -r '.data.result[0].value[1] // ""')
          echo "  builds namespace CPU series → ${bf:-<none>} (Builds panel data)"

          # NATS exporter (#56 Streams panel): the prometheus-nats-exporter
          # sidecar (:7777, scraped via the pod's prometheus.io annotation)
          # turns NATS's JSON /varz + /jsz into Prometheus metrics. gnatsd_* are
          # server varz gauges (always present); jetstream_* are the JetStream
          # server gauges the panel plots (present once JS is up — it is, the
          # readiness gate proved it). Dump the names, then assert both landed.
          echo "--- gnatsd_* / jetstream_* names in VM (sample) ---"
          curl -fsS "http://localhost:18428/api/v1/label/__name__/values" 2>/dev/null \
            | jq -r '.data[]?' | grep -E '^(gnatsd_|jetstream_)' | sort | head -60 || true
          gnatsd=0
          for _ in $(seq 1 24); do
            gnatsd=$(curl -fsS -G http://localhost:18428/api/v1/query \
              --data-urlencode 'query=count({__name__=~"gnatsd_.+"})' \
              | jq -r '.data.result[0].value[1] // "0"')
            [ "${gnatsd:-0}" -gt 0 ] 2>/dev/null && break
            sleep 5
          done
          echo "VM gnatsd_* series = ${gnatsd}"
          # Hard: gnatsd_* present proves the exporter sidecar is up AND the
          # annotation-based scrape reached its :7777 — the Streams panel's whole
          # data path. The exact per-metric names stay soft below (exporter
          # version can rename them; the dump above is ground truth).
          [ "${gnatsd:-0}" -gt 0 ] 2>/dev/null || { echo "❌ NATS exporter /metrics not scraped into VM (Streams panel)"; exit 1; }
          js=$(curl -fsS -G http://localhost:18428/api/v1/query --data-urlencode 'query=count({__name__=~"jetstream_.+"})' 2>/dev/null | jq -r '.data.result[0].value[1] // "0"')
          echo "VM jetstream_* series = ${js} (soft — JetStream gauges; pin from the dump if 0)"
          # Report the exact panel metrics (soft — the exporter's version can
          # drift the names; the dump above is ground truth, so pin from it if a
          # count reads 0 rather than failing the whole rehearsal here).
          for m in gnatsd_varz_connections jetstream_server_total_messages jetstream_server_total_message_bytes; do
            n=$(curl -fsS -G http://localhost:18428/api/v1/query --data-urlencode "query=count($m)" 2>/dev/null | jq -r '.data.result[0].value[1] // "0"')
            echo "  $m → ${n} series$([ "${n:-0}" -gt 0 ] 2>/dev/null || echo '  ⚠️ pin the panel query to the dumped name')"
          done
          echo "✅ NATS exporter scraped into VictoriaMetrics (Streams panel data source: gnatsd_* + jetstream_*)"

          # Buckets panel (#56): RustFS has no /metrics, so the panel uses the
          # generic per-namespace kubeletstats signal (same names the console
          # Monitoring panel already proves, just filtered to namespace rustfs).
          # Soft report that the rustfs-scoped series exist so the panel has data.
          rf=$(curl -fsS -G http://localhost:18428/api/v1/query --data-urlencode 'query=sum(k8s_pod_cpu_usage{k8s_namespace_name="rustfs"})' 2>/dev/null | jq -r '.data.result[0].value[1] // ""')
          echo "  rustfs namespace CPU series → ${rf:-<none>} (Buckets panel data)"

          # --- logs proof: a non-app pod's logs must reach VLogs. kube-system
          # (cilium et al.) is never a first-party app, so its presence in the
          # recent log stream proves filelog is collecting platform components.
          found=""
          for _ in $(seq 1 24); do
            logs=$(curl -fsS -G http://localhost:19428/select/logsql/query \
              --data-urlencode 'query=_time:10m' --data-urlencode 'limit=500' 2>/dev/null || true)
            # bash pattern match (not printf|grep -q): under `set -o pipefail`,
            # grep -q exits early on a match and SIGPIPEs printf (141), which
            # pipefail turns into a false negative — a real flake.
            if [[ "$logs" == *kube-system* ]]; then found=1; break; fi
            sleep 5
          done
          [ -n "$found" ] || { echo "❌ no component logs in VLogs"; exit 1; }

          # --- traces proof: an APP trace must reach VictoriaTraces via the
          # collector's OTLP receiver. The portal (NodePort 30600) is OTel-
          # instrumented and now points OTEL_EXPORTER_OTLP_ENDPOINT at the
          # collector — hit it to emit server spans, then query VictoriaTraces'
          # Jaeger API for the service. This proves the app→collector→VT path
          # that replaced otel-lgtm's Tempo.
          for _ in $(seq 1 10); do curl -fsS -o /dev/null "http://localhost:30600/" 2>/dev/null || true; sleep 1; done
          traced=""
          for _ in $(seq 1 24); do
            svcs=$(curl -fsS "http://localhost:10428/select/jaeger/api/services" 2>/dev/null || true)
            if [[ "$svcs" == *cloudbox-portal* ]]; then traced=1; break; fi
            curl -fsS -o /dev/null "http://localhost:30600/" 2>/dev/null || true
            sleep 5
          done
          [ -n "$traced" ] || { echo "❌ no app traces in VictoriaTraces (services: ${svcs:-none})"; exit 1; }
          echo "✅ OTel Collector: component metrics in VM + component logs in VLogs + app traces in VictoriaTraces"

          # Console Monitoring panel (#56): the per-component detail page must
          # render a sparkline from VM using the pinned metric names
          # (k8s_pod_cpu_usage / k8s_pod_memory_working_set_bytes). A rendered
          # <polyline> proves the console→VictoriaMetrics query is correct end to
          # end — not just guessed from the receiver docs. kube-system always has
          # pods, so it always has kubeletstats series.
          panel=""
          for _ in $(seq 1 18); do
            html=$(curl -fsS "http://localhost:30600/components/kube-system" 2>/dev/null || true)
            if [[ "$html" == *"<polyline"* ]]; then panel=1; break; fi
            sleep 5
          done
          [ -n "$panel" ] || { echo "❌ console Monitoring panel rendered no sparkline (metric name mismatch?)"; exit 1; }
          echo "✅ console Monitoring panel renders live CPU/mem sparklines from VictoriaMetrics"

          # Functions panel (#56): p95 latency from the app OTLP histogram. VM
          # maps OTLP resource attributes to underscore labels, so the service
          # selector is service_name (not the Prometheus `job`). Dump the actual
          # http_* names + one series' label set first, so any mismatch (name,
          # label, or missing _bucket) is debuggable straight from the log.
          echo "--- app http_* metrics in VM ---"
          curl -fsS "http://localhost:18428/api/v1/label/__name__/values" 2>/dev/null \
            | jq -r '.data[]?' | grep -E '^http_' | sort || true
          echo "--- label set of a request-duration sample ---"
          curl -fsS -G "http://localhost:18428/api/v1/series" \
            --data-urlencode 'match[]=http_server_request_duration_seconds_count' 2>/dev/null \
            | jq -c '.data[0] // "none"' || true
          # These are rate() queries over counters. The app's OTLP metrics only
          # started flowing when the collector came up in THIS step, so rate()
          # needs a couple more app export cycles (~60s each) with the counter
          # increasing. Poll while generating portal traffic so the http_server
          # counters accumulate samples; NaN (0/0, no requests yet) also retries.
          lat=""
          for _ in $(seq 1 30); do
            curl -fsS -o /dev/null "http://localhost:30600/" 2>/dev/null || true
            lat=$(curl -fsS -G http://localhost:18428/api/v1/query \
              --data-urlencode 'query=sum(rate(http_server_request_duration_seconds_sum{service_name="cloudbox-portal"}[5m])) / sum(rate(http_server_request_duration_seconds_count{service_name="cloudbox-portal"}[5m]))' \
              2>/dev/null | jq -r '.data.result[0].value[1] // ""')
            [ -n "$lat" ] && [ "$lat" != "NaN" ] && break
            sleep 5
          done
          echo "portal avg latency query → ${lat:-<empty>}"
          { [ -n "$lat" ] && [ "$lat" != "NaN" ]; } || { echo "❌ avg latency query returned no value (Functions panel)"; exit 1; }
          echo "✅ avg latency query resolves (Functions panel)"

          # Telemetry depth (#65). Two halves:
          #  (1) spanmetrics + servicegraph connectors turn the trace stream into
          #      RED metrics (span_*) and service-graph edge metrics; Knative now
          #      pushes its own traces + metrics to the collector.
          #  (2) The connected trace + populated service map only PROVE themselves
          #      with a cross-service request — so drive one real upload through
          #      the pipeline (portal → uploader → broker → resizer) AFTER the
          #      collector is up, then assert the pipeline services + graph edges
          #      appear. This is the actual proof that the Knative-tracing fix
          #      connects the chain across the async broker hop.
          echo "--- Knative-pushed metric names in VM (kn_* — component + scale-from-zero) ---"
          curl -fsS "http://localhost:18428/api/v1/label/__name__/values" 2>/dev/null \
            | jq -r '.data[]?' | grep -iE '^kn_' | sort | head -40 || echo "(none — Knative OTLP push may need a cycle)"
          # Label sets for the scale-from-zero metrics the console Services page
          # will query — need to know which label carries the ksvc name.
          for m in kn_revision_pods_desired kn_revision_pods_count kn_revision_concurrency_stable; do
            echo "  ${m} labels →"; curl -fsS -G "http://localhost:18428/api/v1/series" --data-urlencode "match[]=${m}" 2>/dev/null | jq -c '.data[0] // "none"' || true
          done

          # Drive one upload through the pipeline FIRST (the picture-pipeline ksvcs
          # from module 09 still exist, scaled to zero). 1x1 PNG, same multipart
          # POST the gallery form makes. Cold-starts uploader → CloudEvent → broker
          # → resizer — this is what generates the cross-service spans that every
          # assertion below needs (services, spanmetrics, servicegraph). Doing it
          # up front is the fix for the earlier single-shot span check reading 0.
          printf '%s' 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==' | base64 -d > /tmp/tel.png
          for _ in $(seq 1 5); do
            curl -fsS --max-time 60 -o /dev/null -F "file=@/tmp/tel.png;type=image/png;filename=tel.png" http://localhost:30600/gallery/upload 2>/dev/null && break
            sleep 3
          done
          # Poll the Jaeger service list — the pipeline should now be traced end to
          # end. cloudbox-uploader proves portal→uploader traced; cloudbox-resizer
          # proves the chain survived the async broker hop (the headline fix).
          # Keep re-uploading each round to keep spans flowing for the connectors.
          up=""; rz=""
          for _ in $(seq 1 30); do
            curl -fsS --max-time 30 -o /dev/null -F "file=@/tmp/tel.png;type=image/png;filename=tel.png" http://localhost:30600/gallery/upload 2>/dev/null || true
            svcs=$(curl -fsS "http://localhost:10428/select/jaeger/api/services" 2>/dev/null | jq -r '.data[]?' || true)
            [[ "$svcs" == *cloudbox-uploader* ]] && up=1
            [[ "$svcs" == *cloudbox-resizer* ]] && rz=1
            [ -n "$up" ] && [ -n "$rz" ] && break
            sleep 5
          done
          echo "--- jaeger services in VictoriaTraces after the upload ---"
          curl -fsS "http://localhost:10428/select/jaeger/api/services" 2>/dev/null | jq -r '.data[]?' | sort || true
          [ -n "$up" ] || { echo "❌ cloudbox-uploader never appeared in traces after an upload"; exit 1; }
          [ -n "$rz" ] || { echo "❌ cloudbox-resizer not traced — the chain broke at the broker (tracing/propagation gap)"; exit 1; }
          echo "✅ connected trace: portal → uploader → broker → resizer all in VictoriaTraces"
          # spanmetrics RED — poll (flushes every 15s; the uploads produced spans).
          sm=0
          for _ in $(seq 1 18); do
            sm=$(curl -fsS -G http://localhost:18428/api/v1/query --data-urlencode 'query=count({__name__=~"span_.+"})' 2>/dev/null | jq -r '.data.result[0].value[1] // "0"')
            [ "${sm:-0}" -gt 0 ] 2>/dev/null && break
            sleep 5
          done
          echo "VM span_* (spanmetrics RED) series = ${sm}"
          [ "${sm:-0}" -gt 0 ] 2>/dev/null || { echo "❌ spanmetrics connector produced no series"; exit 1; }
          # service-graph edges — formed from the paired client/server spans.
          sg=0
          for _ in $(seq 1 18); do
            sg=$(curl -fsS -G http://localhost:18428/api/v1/query --data-urlencode 'query=count({__name__=~"traces_service_graph_.+"})' 2>/dev/null | jq -r '.data.result[0].value[1] // "0"')
            [ "${sg:-0}" -gt 0 ] 2>/dev/null && break
            sleep 5
          done
          echo "--- traces_service_graph_* names + a sample edge ---"
          curl -fsS "http://localhost:18428/api/v1/label/__name__/values" 2>/dev/null | jq -r '.data[]?' | grep -E '^traces_service_graph_' | sort || true
          curl -fsS -G "http://localhost:18428/api/v1/series" --data-urlencode 'match[]=traces_service_graph_request_total' 2>/dev/null | jq -c '.data[0] // "none"' || true
          echo "VM traces_service_graph_* (service map edges) series = ${sg}"
          [ "${sg:-0}" -gt 0 ] 2>/dev/null || { echo "❌ servicegraph connector formed no edges despite a cross-service upload"; exit 1; }
          echo "✅ service map: servicegraph edges present in VM (aggregate topology data)"

          # Console scale-from-zero (#83): the Services page surfaces each ksvc's
          # desired pods from kn_revision_pods_desired — 'idle · 0 pods' or 'N
          # running'. Soft: the pipeline ksvcs may be scaling down at check time,
          # but the scale text should render for at least one ksvc.
          svcpage=$(curl -fsS "http://localhost:30600/services" 2>/dev/null || true)
          if [[ "$svcpage" == *"pods"* || "$svcpage" == *"running"* ]]; then
            echo "✅ console Services page surfaces scale-from-zero"
          else
            echo "⚠️ Services page showed no scale text yet (kn_revision_pods_desired timing)"
          fi

          # Catalog the component/app metric names VM actually stores (now that
          # -opentelemetry.usePrometheusNaming is on) — the console's Monitoring
          # panels (#56) pin their PromQL to these exact names, so surface them.
          {
            echo ""
            echo "### Metric catalog for console panels (#56)"
            echo ""
            echo '```'
            curl -fsS "http://localhost:18428/api/v1/label/__name__/values" 2>/dev/null \
              | jq -r '.data[]?' | grep -E '^(k8s_|container_|http_|cloudbox_)' | sort || echo "(query failed)"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
          {
            echo ""
            echo "### Observability v2 — full collection (#57, lgtm-free)"
            echo "OTel Collector (agent DaemonSet + gateway Deployment) enabled; **component** metrics landed in VictoriaMetrics (\`k8s_*\` = ${metrics} series), **component** logs (kube-system) in VictoriaLogs, and **app traces** (cloudbox-portal) in VictoriaTraces. otel-lgtm is gone; the Victoria stack is the whole observability capability. ✅"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Verify Functions page — build source → deploy → invoke → delete (#58)
        run: |
          set -euo pipefail
          # #58 end to end: the console's Functions page must turn a source into a
          # running, scale-to-zero function — and now also invoke and delete it.
          # Grant the portal its two write scopes (in the real workshop the
          # attendee pushes this via git; here apply it directly — the Roles
          # aren't in any ArgoCD-synced path, so nothing prunes them), then drive
          # the page's POST and prove BOTH halves converge: the build Workflow
          # Succeeds and the Knative Service serves through Kourier. This is the
          # marquee create-flow, so it earns a real end-to-end assertion.
          kubectl apply -f lab/08-portal/portal-functions-access.yaml
          fn=e2efn
          # POST the build-and-deploy form exactly as the browser would (page is
          # unlocked: argo + knative went Healthy in modules 06/07). The route
          # merged onto the Functions page — POST /services returns the refreshed
          # list fragment.
          code=$(curl -fsS -o /tmp/fn-resp.html -w '%{http_code}' -X POST \
            --data-urlencode "name=${fn}" --data-urlencode "sample=hello-site" \
            http://localhost:30600/services 2>/dev/null || true)
          echo "POST /services → HTTP ${code}"; cat /tmp/fn-resp.html 2>/dev/null || true; echo
          [ "${code}" = "200" ] || { echo "❌ build-and-deploy POST failed (HTTP ${code})"; exit 1; }
          # Build half: a Workflow build-fn-e2efn-* appears in `builds` and
          # Succeeds (git clone → BuildKit → push fn-e2efn:v1 to Zot).
          wf=""
          for _ in $(seq 1 30); do
            wf=$(kubectl -n builds get wf -o name 2>/dev/null | grep "build-fn-${fn}-" | head -1 || true)
            [ -n "$wf" ] && break; sleep 5
          done
          [ -n "$wf" ] || { echo "❌ no build-fn-${fn}-* Workflow created (RBAC missing, or page locked?)"; kubectl -n builds get wf; exit 1; }
          echo "created ${wf}"
          kubectl -n builds wait --for=jsonpath='{.status.phase}'=Succeeded "$wf" --timeout=240s \
            || { echo "❌ build workflow did not Succeed"; kubectl -n builds get "$wf" -o yaml | tail -40; exit 1; }
          echo "✅ build workflow Succeeded"
          # Deploy half: the ksvc fn-e2efn converges from ImagePullBackOff to
          # Ready once the image lands (localhost:30500 is in Knative's
          # tag-resolution-skip list, so it was admitted immediately).
          kubectl -n demo wait --for=condition=Ready "ksvc/fn-${fn}" --timeout=180s \
            || { echo "❌ ksvc fn-${fn} not Ready"; kubectl -n demo describe ksvc "fn-${fn}" | tail -40; exit 1; }
          echo "✅ ksvc fn-${fn} Ready"
          # Serve it through Kourier (:31080, Host header), like module 06.
          url=$(kubectl -n demo get ksvc "fn-${fn}" -o jsonpath='{.status.url}')
          host="${url#http://}"; host="${host#https://}"
          body=$(curl -fsS --max-time 30 -H "Host: ${host}" http://localhost:31080/ 2>/dev/null || true)
          echo "curl fn (${host}) → $(echo "$body" | head -1)"
          echo "$body" | grep -qi "hello-site" || { echo "❌ function did not serve the expected page"; exit 1; }
          echo "✅ Functions (#58): the console built source in-cluster and served it as a scale-to-zero function"

          # Invoke from the console (the new server-side "Test" action): the
          # portal GETs the function's cluster-local URL and renders the
          # response. This exercises the exact path the Invoke button drives —
          # portal → kourier-internal → fn revision (waking from zero). Retry a
          # few times: the ksvc may have just scaled back to zero, so the first
          # invoke pays a cold start.
          inv=""
          for _ in $(seq 1 6); do
            inv=$(curl -fsS --max-time 40 -X POST "http://localhost:30600/services/demo/fn-${fn}/invoke" 2>/dev/null || true)
            echo "$inv" | grep -qi "hello-site" && break
            sleep 5
          done
          echo "$inv" | grep -qi "hello-site" \
            || { echo "❌ console Invoke did not return the function's response"; echo "$inv" | head -20; exit 1; }
          echo "$inv" | grep -q "200 OK" || { echo "❌ console Invoke did not report 200 OK"; echo "$inv" | head -20; exit 1; }
          echo "✅ console Invoke woke the function server-side and rendered its 200 response"

          # Delete from the console: DELETE /services/{name} removes the ksvc
          # (portal-functions-serve grants delete in demo). Prove it's gone.
          dcode=$(curl -fsS -o /dev/null -w '%{http_code}' -X DELETE "http://localhost:30600/services/fn-${fn}" 2>/dev/null || true)
          echo "DELETE /services/fn-${fn} → HTTP ${dcode}"
          [ "${dcode}" = "200" ] || { echo "❌ console Delete failed (HTTP ${dcode})"; exit 1; }
          for _ in $(seq 1 12); do
            kubectl -n demo get ksvc "fn-${fn}" >/dev/null 2>&1 || break; sleep 5
          done
          kubectl -n demo get ksvc "fn-${fn}" >/dev/null 2>&1 \
            && { echo "❌ ksvc fn-${fn} still present after console Delete"; exit 1; }
          echo "✅ console Delete removed the Knative Service"
          { echo ""; echo "### Functions (#58) — build → deploy → invoke → delete from the console ✅"; echo "POSTed the form; \`${wf##*/}\` Succeeded, \`fn-${fn}\` served through Kourier, the console **invoked** it (200 OK, woke from zero) and then **deleted** it."; } >> "${GITHUB_STEP_SUMMARY}"

      - name: Verify Buckets page — S3 CRUD from the console (#26)
        run: |
          set -euo pipefail
          # The Buckets page gained the write half: create a bucket, upload an
          # object, delete the object, delete the bucket — all pure S3 (minio-go
          # → RustFS), driven through the portal exactly as the browser would.
          b=e2e-crud
          base=http://localhost:30600
          # Create.
          c=$(curl -fsS -o /dev/null -w '%{http_code}' -X POST "$base/buckets" --data-urlencode "name=$b" 2>/dev/null || true)
          echo "POST /buckets name=$b → HTTP $c"; [ "$c" = 200 ] || { echo "❌ create-bucket failed"; exit 1; }
          kubectl -n rustfs get pods >/dev/null 2>&1 || true
          # Upload a small object (multipart, as the browser sends it).
          echo "hello cloudbox" > /tmp/hello.txt
          u=$(curl -fsS -o /tmp/up.html -w '%{http_code}' -X POST "$base/buckets/$b/upload" -F "file=@/tmp/hello.txt" 2>/dev/null || true)
          echo "POST /buckets/$b/upload → HTTP $u"; [ "$u" = 200 ] || { echo "❌ upload failed"; cat /tmp/up.html; exit 1; }
          # The object list fragment must now show the uploaded key.
          curl -fsS "$base/buckets/objects?b=$b" 2>/dev/null | grep -q "hello.txt" \
            || { echo "❌ uploaded object not listed"; exit 1; }
          echo "✅ created bucket + uploaded object, visible in the console"
          # Delete the object, then the (now empty) bucket.
          do_=$(curl -fsS -o /dev/null -w '%{http_code}' -X DELETE "$base/buckets/$b/objects/hello.txt" 2>/dev/null || true)
          echo "DELETE object → HTTP $do_"; [ "$do_" = 200 ] || { echo "❌ delete-object failed"; exit 1; }
          db=$(curl -fsS -o /dev/null -w '%{http_code}' -X DELETE "$base/buckets/$b" 2>/dev/null || true)
          echo "DELETE bucket → HTTP $db"; [ "$db" = 200 ] || { echo "❌ delete-bucket failed"; exit 1; }
          # Prove the bucket is gone from the list.
          curl -fsS "$base/buckets" 2>/dev/null | grep -q ">$b<" \
            && { echo "❌ bucket $b still listed after delete"; exit 1; } || true
          echo "✅ deleted object + bucket from the console"
          { echo ""; echo "### Buckets (#26) — create → upload → delete object → delete bucket from the console ✅"; } >> "${GITHUB_STEP_SUMMARY}"

      - name: Verify Databases resize from the console (#27)
        run: |
          set -euo pipefail
          # The Databases detail page can now RESIZE a WorkshopDatabase — a merge
          # patch on spec.size, needing the patch/update verbs added to
          # portal-access.yaml. Grant the portal its database keys, create one
          # from the console, resize it, and prove spec.size actually changed
          # (validates the RBAC verb AND the merge-patch+json content type).
          kubectl apply -f lab/08-portal/portal-access.yaml
          base=http://localhost:30600
          db=e2edb
          c=$(curl -fsS -o /dev/null -w '%{http_code}' -X POST "$base/databases" --data-urlencode "name=$db" --data-urlencode "size=small" 2>/dev/null || true)
          echo "POST /databases $db size=small → HTTP $c"; [ "$c" = 200 ] || { echo "❌ create-database failed"; exit 1; }
          # Wait for the XR to exist and read back size=small.
          sz=""
          for _ in $(seq 1 20); do
            sz=$(kubectl -n demo get workshopdatabase "$db" -o jsonpath='{.spec.size}' 2>/dev/null || true)
            [ -n "$sz" ] && break; sleep 3
          done
          [ "$sz" = small ] || { echo "❌ WorkshopDatabase $db not created at size=small (got '$sz')"; exit 1; }
          echo "✅ console created WorkshopDatabase $db (small)"
          # Resize small → medium (the patch path + RBAC).
          rc=$(curl -fsS -o /dev/null -w '%{http_code}' -X POST "$base/databases/$db/resize" --data-urlencode "size=medium" 2>/dev/null || true)
          echo "POST /databases/$db/resize medium → HTTP $rc"; [ "$rc" = 200 ] || { echo "❌ resize failed (RBAC patch verb? content-type?)"; exit 1; }
          for _ in $(seq 1 10); do
            [ "$(kubectl -n demo get workshopdatabase "$db" -o jsonpath='{.spec.size}' 2>/dev/null)" = medium ] && break; sleep 2
          done
          got=$(kubectl -n demo get workshopdatabase "$db" -o jsonpath='{.spec.size}' 2>/dev/null || true)
          [ "$got" = medium ] || { echo "❌ resize didn't stick: spec.size=$got"; exit 1; }
          echo "✅ console resized $db small → medium (spec.size patched)"
          # Cleanup: delete via the console too.
          curl -fsS -o /dev/null -X DELETE "$base/databases/$db" 2>/dev/null || true
          { echo ""; echo "### Databases (#27) — create → resize (spec.size patch) from the console ✅"; } >> "${GITHUB_STEP_SUMMARY}"

      - name: Verify Applications page — deploy the golden path from the console (#28)
        run: |
          set -euo pipefail
          # The Applications page creates an Application XR (workload + DB + bucket)
          # from a form. Grant the portal its applications key, deploy one from the
          # console, prove the XR appears with the requested image, then delete it.
          # (Full composition to Ready is the golden-path step's job; here we prove
          # the console's create/delete path + its RBAC.)
          kubectl apply -f lab/08-portal/portal-applications-access.yaml
          base=http://localhost:30600
          app=e2eapp
          img=ghcr.io/randax/cloudbox-uploader:v0.1.0
          c=$(curl -fsS -o /dev/null -w '%{http_code}' -X POST "$base/applications" \
            --data-urlencode "name=$app" --data-urlencode "image=$img" \
            --data-urlencode "min=0" --data-urlencode "max=3" \
            --data-urlencode "database=1" --data-urlencode "bucket=1" 2>/dev/null || true)
          echo "POST /applications $app → HTTP $c"; [ "$c" = 200 ] || { echo "❌ create-application failed"; exit 1; }
          # NB: fully-qualified resource — a bare `application` is ambiguous
          # (argoproj.io AND platform.cloudbox.io both register `applications`),
          # and kubectl would query the ArgoCD one and find nothing.
          got=""
          for _ in $(seq 1 20); do
            got=$(kubectl -n demo get applications.platform.cloudbox.io "$app" -o jsonpath='{.spec.image}' 2>/dev/null || true)
            [ -n "$got" ] && break; sleep 3
          done
          [ "$got" = "$img" ] || { echo "❌ Application $app not created with image $img (got '$got')"; exit 1; }
          echo "✅ console created Application $app (image $img)"
          # Delete via the console, then prove the XR is gone.
          dc=$(curl -fsS -o /dev/null -w '%{http_code}' -X DELETE "$base/applications/$app" 2>/dev/null || true)
          echo "DELETE /applications/$app → HTTP $dc"; [ "$dc" = 200 ] || { echo "❌ delete-application failed"; exit 1; }
          for _ in $(seq 1 12); do
            kubectl -n demo get applications.platform.cloudbox.io "$app" >/dev/null 2>&1 || break; sleep 5
          done
          kubectl -n demo get applications.platform.cloudbox.io "$app" >/dev/null 2>&1 \
            && { echo "❌ Application $app still present after console delete"; exit 1; } || true
          echo "✅ console deleted Application $app"
          { echo ""; echo "### Applications (#28) — deploy → delete the golden-path XR from the console ✅"; } >> "${GITHUB_STEP_SUMMARY}"

      - name: Verify Projects — create a project + provision into it (#96, PRD-0011)
        run: |
          set -euo pipefail
          # Projects map to namespaces. The console CREATES one (namespace +
          # a portal-tenant RoleBinding) behind a scoped, git-delivered grant —
          # "grant via git; act via console". Prove the whole loop: grant, create
          # a project from the console, confirm the namespace + binding exist,
          # provision a database INTO the project (cookie-scoped), then delete
          # the project and watch it cascade. This exercises the trickiest RBAC
          # in the console — namespace create + the `bind` escalation guard.
          kubectl apply -f lab/08-portal/portal-projects-access.yaml
          base=http://localhost:30600
          proj=team-e2e
          # Create the project from the console.
          # A non-htmx client gets a 303 (POST-redirect-GET) on success; a
          # failed create renders the bar fragment with a flash (200). Accept
          # either at the HTTP layer — the kubectl checks below are the real gate.
          c=$(curl -sS -o /dev/null -w '%{http_code}' -X POST "$base/projects" --data-urlencode "name=$proj" 2>/dev/null || true)
          echo "POST /projects $proj → HTTP $c"; case "$c" in 200|303) ;; *) echo "❌ create-project POST errored (HTTP $c)"; exit 1;; esac
          # The namespace exists, is labelled a project, and carries the tenant binding.
          for _ in $(seq 1 15); do kubectl get ns "$proj" >/dev/null 2>&1 && break; sleep 2; done
          kubectl get ns "$proj" -o jsonpath='{.metadata.labels.platform\.cloudbox\.io/project}' | grep -q true \
            || { echo "❌ namespace $proj not labelled a project"; kubectl get ns "$proj" -o yaml | tail -20; exit 1; }
          kubectl -n "$proj" get rolebinding portal-tenant >/dev/null 2>&1 \
            || { echo "❌ portal-tenant RoleBinding missing in $proj (bind grant?)"; exit 1; }
          echo "✅ console created project $proj (labelled namespace + portal-tenant binding)"
          # Provision a database INTO the project — the cookie scopes the create.
          dc=$(curl -fsS -o /dev/null -w '%{http_code}' -X POST "$base/databases" -b "project=$proj" \
            --data-urlencode "name=projdb" --data-urlencode "size=small" 2>/dev/null || true)
          echo "POST /databases (project=$proj) → HTTP $dc"; [ "$dc" = 200 ] || { echo "❌ scoped create-database failed"; exit 1; }
          got=""
          for _ in $(seq 1 20); do
            got=$(kubectl -n "$proj" get workshopdatabases.platform.cloudbox.io projdb -o jsonpath='{.metadata.name}' 2>/dev/null || true)
            [ -n "$got" ] && break; sleep 3
          done
          [ "$got" = projdb ] || { echo "❌ database not created in project $proj (RBAC scoped there?)"; exit 1; }
          echo "✅ console provisioned a database INTO project $proj"
          # Delete the project — cascades to everything inside it.
          pc=$(curl -sS -o /dev/null -w '%{http_code}' -X DELETE "$base/projects/$proj" 2>/dev/null || true)
          echo "DELETE /projects/$proj → HTTP $pc"; case "$pc" in 200|303) ;; *) echo "❌ delete-project errored (HTTP $pc)"; exit 1;; esac
          for _ in $(seq 1 24); do kubectl get ns "$proj" >/dev/null 2>&1 || break; sleep 5; done
          kubectl get ns "$proj" >/dev/null 2>&1 && echo "⚠️ namespace $proj still terminating (cascade slow) — acceptable" || echo "✅ project $proj deleted (namespace gone)"
          { echo ""; echo "### Projects (#96, PRD-0011) — create project → provision into it → delete, from the console ✅"; } >> "${GITHUB_STEP_SUMMARY}"

      - name: Verify deploy-from-source — real demo app, DB + bucket wired (PRD-0012, #35)
        run: |
          set -euo pipefail
          # The app-team golden path, end to end, with the REAL seeded demo app
          # (cloudbox/demo-app, seeded by seed-gitea.sh): the console builds it
          # from its own Gitea repo and deploys it as an Application, and the
          # running app USES its composed Postgres (a visit counter) + S3 bucket.
          # Needs BOTH grants (workflows + applications), applied above.
          base=http://localhost:30600
          app=demoapp
          # An in-cluster build pod can't reach the internet (offline cluster), so
          # the demo app's golang builder base must be in Zot — seed it the same
          # way module 07 seeds busybox (host-side crane against Zot's NodePort).
          mise x crane@0.21.7 -- crane copy --insecure \
            public.ecr.aws/docker/library/golang:1.25-alpine \
            localhost:30500/library/golang:1.25-alpine
          echo "✅ seeded the golang builder base into Zot"
          # source=repo → build cloudbox/demo-app (multi-stage golang Dockerfile),
          # push to Zot, create the Application at the built image.
          c=$(curl -sS -o /dev/null -w '%{http_code}' -X POST "$base/applications" \
            --data-urlencode "name=$app" --data-urlencode "source=repo" \
            --data-urlencode "repo=cloudbox/demo-app" --data-urlencode "branch=main" \
            --data-urlencode "path=." \
            --data-urlencode "database=1" --data-urlencode "bucket=1" 2>/dev/null || true)
          echo "POST /applications (source=repo) → HTTP $c"; [ "$c" = 200 ] || { echo "❌ deploy-from-source POST errored (HTTP $c)"; exit 1; }
          # Build half: a build-app-demoapp-* Workflow appears. Poll its phase so a
          # Failed build fails FAST (with the build's error) instead of hanging the
          # full wait timeout.
          wf=""
          for _ in $(seq 1 30); do
            wf=$(kubectl -n builds get wf -o name 2>/dev/null | grep "build-app-${app}-" | head -1 || true)
            [ -n "$wf" ] && break; sleep 5
          done
          [ -n "$wf" ] || { echo "❌ no build-app-${app}-* Workflow (RBAC missing, or source not parsed?)"; kubectl -n builds get wf; exit 1; }
          ph=""
          for _ in $(seq 1 84); do
            ph=$(kubectl -n builds get "$wf" -o jsonpath='{.status.phase}' 2>/dev/null || true)
            case "$ph" in
              Succeeded) break;;
              Failed|Error)
                echo "❌ demo-app build $ph — node messages:"
                kubectl -n builds get "$wf" -o jsonpath='{range .status.nodes.*}{.displayName}{": "}{.message}{"\n"}{end}'
                echo "--- build container log ---"
                bp=$(kubectl -n builds get pods -l "workflows.argoproj.io/workflow=${wf##*/}" -o name 2>/dev/null | head -1)
                [ -n "$bp" ] && kubectl -n builds logs "$bp" -c main --tail=40 2>/dev/null || true
                exit 1;;
            esac
            sleep 5
          done
          [ "$ph" = Succeeded ] || { echo "❌ demo-app build didn't Succeed in time (phase=$ph)"; exit 1; }
          echo "✅ built the demo app from its own repo (${wf##*/})"
          # The XR points at the built node-side image (unique per-build tag).
          img=$(kubectl -n demo get applications.platform.cloudbox.io "$app" -o jsonpath='{.spec.image}' 2>/dev/null || true)
          case "$img" in
            localhost:30500/app-${app}:*) ;;
            *) echo "❌ Application image = '$img', want localhost:30500/app-${app}:<tag>"; exit 1;;
          esac
          # Deploy half: the composed workload runs and USES its dependencies.
          kubectl -n demo wait --for=condition=Ready "ksvc/${app}" --timeout=300s \
            || { echo "❌ composed ksvc ${app} not Ready"; kubectl -n demo describe ksvc "${app}" | tail -30; exit 1; }
          host=$(kubectl -n demo get ksvc "${app}" -o jsonpath='{.status.url}'); host="${host#http://}"
          # The page must show a DB-backed visit counter (proves the composed
          # Postgres is wired AND used) — give the DB a moment to finish composing.
          got=""
          for _ in $(seq 1 30); do
            got=$(curl -sS --max-time 20 -H "Host: ${host}" http://localhost:31080/ 2>/dev/null || true)
            echo "$got" | grep -qE 'visitor <b>#[0-9]' && break; sleep 5
          done
          echo "$got" | grep -qE 'visitor <b>#[0-9]' \
            || { echo "❌ demo-app didn't report a DB-backed counter (Postgres wiring?)"; echo "$got" | head -40; exit 1; }
          echo "$got" | grep -qi "Bucket <code>" || echo "⚠️ bucket line missing on the demo-app page"
          echo "✅ deploy-from-source: the demo app runs and USES its composed Postgres (visit counter) + bucket"
          curl -sS -o /dev/null -X DELETE "$base/applications/${app}" 2>/dev/null || true
          { echo ""; echo "### Deploy-from-source + demo app (PRD-0012 / #35) — built cloudbox/demo-app from source; the running app uses its composed Postgres (live counter) + S3 bucket ✅"; } >> "${GITHUB_STEP_SUMMARY}"

      - name: Verify scaffold bridge — console creates a repo from a template, then deploys it (PRD-0012)
        run: |
          set -euo pipefail
          # "Console creates the repo": source=template makes the portal call
          # Gitea's generate API to fork cloudbox/demo-app into a fresh tenant repo
          # (cloudbox/<name>), then builds and deploys THAT repo from source. The
          # golang builder base is already in Zot (seeded by the step above, same run).
          base=http://localhost:30600
          app=scaffolded
          gitea=http://localhost:30300
          creds=gitea_admin:cloudbox123
          # Make sure a stale repo from a re-run doesn't turn "generate" into a 409.
          curl -sS -o /dev/null -X DELETE -u "$creds" "$gitea/api/v1/repos/cloudbox/${app}" 2>/dev/null || true
          c=$(curl -sS -o /dev/null -w '%{http_code}' -X POST "$base/applications" \
            --data-urlencode "name=$app" --data-urlencode "source=template" \
            --data-urlencode "template=cloudbox/demo-app" \
            --data-urlencode "database=1" --data-urlencode "bucket=1" 2>/dev/null || true)
          echo "POST /applications (source=template) → HTTP $c"; [ "$c" = 200 ] || { echo "❌ scaffold-from-template POST errored (HTTP $c)"; exit 1; }
          # The NEW behavior: the console created the repo in Gitea.
          rc=$(curl -sS -o /dev/null -w '%{http_code}' -u "$creds" "$gitea/api/v1/repos/cloudbox/${app}" 2>/dev/null || true)
          [ "$rc" = 200 ] || { echo "❌ console didn't create cloudbox/${app} in Gitea (HTTP $rc)"; exit 1; }
          echo "✅ console scaffolded cloudbox/${app} from the template"
          # And it builds from the scaffolded repo (fail fast on a Failed build).
          wf=""
          for _ in $(seq 1 30); do
            wf=$(kubectl -n builds get wf -o name 2>/dev/null | grep "build-app-${app}-" | head -1 || true)
            [ -n "$wf" ] && break; sleep 5
          done
          [ -n "$wf" ] || { echo "❌ no build-app-${app}-* Workflow for the scaffolded repo"; kubectl -n builds get wf; exit 1; }
          ph=""
          for _ in $(seq 1 84); do
            ph=$(kubectl -n builds get "$wf" -o jsonpath='{.status.phase}' 2>/dev/null || true)
            case "$ph" in
              Succeeded) break;;
              Failed|Error)
                echo "❌ scaffolded build $ph — node messages:"
                kubectl -n builds get "$wf" -o jsonpath='{range .status.nodes.*}{.displayName}{": "}{.message}{"\n"}{end}'
                exit 1;;
            esac
            sleep 5
          done
          [ "$ph" = Succeeded ] || { echo "❌ scaffolded build didn't Succeed in time (phase=$ph)"; exit 1; }
          # And it deploys and serves (proves scaffold → build → deploy end to end).
          kubectl -n demo wait --for=condition=Ready "ksvc/${app}" --timeout=300s \
            || { echo "❌ scaffolded ksvc ${app} not Ready"; kubectl -n demo describe ksvc "${app}" | tail -30; exit 1; }
          host=$(kubectl -n demo get ksvc "${app}" -o jsonpath='{.status.url}'); host="${host#http://}"
          got=""
          for _ in $(seq 1 30); do
            got=$(curl -sS --max-time 20 -H "Host: ${host}" http://localhost:31080/ 2>/dev/null || true)
            echo "$got" | grep -qE 'visitor <b>#[0-9]' && break; sleep 5
          done
          echo "$got" | grep -qE 'visitor <b>#[0-9]' \
            || { echo "❌ scaffolded app didn't report a DB-backed counter"; echo "$got" | head -40; exit 1; }
          echo "✅ scaffold bridge: console created the repo, built it, and the app runs with its composed DB + bucket"
          # Clean up both the app and the scaffolded repo.
          curl -sS -o /dev/null -X DELETE "$base/applications/${app}" 2>/dev/null || true
          curl -sS -o /dev/null -X DELETE -u "$creds" "$gitea/api/v1/repos/cloudbox/${app}" 2>/dev/null || true
          { echo ""; echo "### Scaffold bridge (PRD-0012) — the console created cloudbox/${app} from the demo-app template, built it, and deployed a working app with its composed DB + bucket ✅"; } >> "${GITHUB_STEP_SUMMARY}"

      - name: Verify the iterate loop — change code → Redeploy → new content (PRD-0012)
        run: |
          set -euo pipefail
          # The dev's core loop: deploy from source, change the code, hit Redeploy,
          # and the RUNNING app must roll forward. This is the test that catches a
          # mutable image tag (a rebuild that doesn't actually deploy).
          # shellcheck source=../../lab/common.sh
          source lab/common.sh
          base=http://localhost:30600
          app=iterapp
          # 1. Deploy from source (the module-07 hello-site) and prove it SERVES.
          curl -sS -o /dev/null -w '%{http_code}\n' -X POST "$base/applications" \
            --data-urlencode "name=$app" --data-urlencode "source=repo" \
            --data-urlencode "repo=cloudbox/platform" --data-urlencode "branch=main" \
            --data-urlencode "path=lab/07-ci/app" \
            --data-urlencode "database=1" --data-urlencode "bucket=1"
          # Wait for the build + the composed ksvc to serve.
          kubectl -n demo wait --for=condition=Ready "ksvc/${app}" --timeout=360s \
            || { echo "❌ first deploy of ${app} not Ready"; kubectl -n demo describe ksvc "${app}" | tail -30; exit 1; }
          host=$(kubectl -n demo get ksvc "${app}" -o jsonpath='{.status.url}'); host="${host#http://}"
          v1=$(curl -sS --max-time 30 -H "Host: ${host}" http://localhost:31080/ 2>/dev/null || true)
          echo "$v1" | grep -q "hello-site" || { echo "❌ deployed app did not serve the expected page"; echo "$v1" | head; exit 1; }
          echo "$v1" | grep -q "ITERATE-MARKER" && { echo "❌ marker already present before the change"; exit 1; } || true
          echo "✅ deployed from source and it serves"
          # 2. Change the code: inject a unique marker into the app's page, push to Gitea.
          CLONE="$(gitops_clone)"
          sed -i 's#<h1>hello-site v1</h1>#<h1>hello-site v1 ITERATE-MARKER</h1>#' "$CLONE/lab/07-ci/app/index.html"
          grep -q "ITERATE-MARKER" "$CLONE/lab/07-ci/app/index.html" || { echo "❌ marker sed didn't apply (page changed?)"; exit 1; }
          gitops_push "$CLONE" "rehearsal: change the demo app to prove the iterate loop"
          # 3. Redeploy from the console — rebuild the (now changed) repo + roll.
          rc=$(curl -sS -o /dev/null -w '%{http_code}' -X POST "$base/applications/${app}/redeploy" 2>/dev/null || true)
          echo "POST /applications/${app}/redeploy → HTTP $rc"; [ "$rc" = 200 ] || { echo "❌ redeploy POST errored (HTTP $rc)"; exit 1; }
          # 4. The RUNNING app must now serve the new content. This fails if the
          #    rebuild reused a mutable tag (no new revision → old code sticks).
          got=""
          for _ in $(seq 1 48); do
            got=$(curl -sS --max-time 20 -H "Host: ${host}" http://localhost:31080/ 2>/dev/null || true)
            echo "$got" | grep -q "ITERATE-MARKER" && break; sleep 5
          done
          echo "$got" | grep -q "ITERATE-MARKER" \
            || { echo "❌ Redeploy did not roll the new code (mutable-tag regression?)"; echo "$got" | head; kubectl -n demo get revisions.serving.knative.dev -l serving.knative.dev/service="${app}"; exit 1; }
          echo "✅ iterate loop works: changed code → Redeploy → the running app serves the new content"
          curl -sS -o /dev/null -X DELETE "$base/applications/${app}" 2>/dev/null || true
          { echo ""; echo "### Iterate loop (PRD-0012) — deploy → change code → Redeploy → running app rolled to new content ✅"; } >> "${GITHUB_STEP_SUMMARY}"

      - name: Verify diagnostics — a broken app shows its CAUSE, not just "not Ready" (DR-0005)
        run: |
          set -euo pipefail
          # DR-0005: when something breaks, the console surfaces the CAUSE a
          # `kubectl describe` would show. Deploy an app with an unpullable image →
          # the composed workload ImagePullBackOffs → the Application DETAIL page
          # (the composition hub — diagnostics live here, not crammed on the list)
          # must show that reason, not merely "not Ready".
          base=http://localhost:30600
          app=brokenapp
          c=$(curl -sS -o /dev/null -w '%{http_code}' -X POST "$base/applications" \
            --data-urlencode "name=$app" --data-urlencode "source=image" \
            --data-urlencode "image=localhost:30500/does-not-exist:nope" \
            --data-urlencode "database=1" --data-urlencode "bucket=1" 2>/dev/null || true)
          echo "POST /applications (unpullable image) → HTTP $c"; [ "$c" = 200 ] || { echo "❌ POST errored (HTTP $c)"; exit 1; }
          # Poll the detail page for the POD-trouble row — its container name
          # ("user-container", Knative's app container) only renders from a real
          # pod trouble, so it won't match the XR/Knative condition text that
          # mentions the image within ~100ms (before any pod has backed off).
          ok=0; page=""
          for _ in $(seq 1 60); do
            page=$(curl -fsS "$base/applications/$app" 2>/dev/null || true)
            if echo "$page" | grep -q "user-container" && echo "$page" | grep -qE "ImagePullBackOff|ErrImagePull"; then ok=1; break; fi
            sleep 5
          done
          [ "$ok" = 1 ] || { echo "❌ detail page didn't surface the image-pull pod trouble"; echo "$page" | grep -iE "diag|why|ready|container" | head; kubectl -n demo get pods; exit 1; }
          echo "$page" | grep -q "Diagnostics" || { echo "❌ page has the reason but no Diagnostics section?"; exit 1; }
          echo "✅ diagnostics: the Application detail page surfaced the ImagePullBackOff cause (not just 'not Ready')"
          curl -sS -o /dev/null -X DELETE "$base/applications/${app}" 2>/dev/null || true
          { echo ""; echo "### Diagnostics (DR-0005) — a broken app's ImagePullBackOff cause is surfaced in the console, not just a red 'not Ready' ✅"; } >> "${GITHUB_STEP_SUMMARY}"

      - name: Resource snapshot → run summary (issue #8 RAM)
        if: always()
        run: |
          sum="${GITHUB_STEP_SUMMARY}"
          {
            echo ""
            echo "### RAM — true working set (kubelet summary, excludes reclaimable cache)"
            echo ""
            echo "| Node | workingSet | usage (incl cache) |"
            echo "|---|---|---|"
          } >> "$sum"
          for n in $(kubectl get nodes -o name 2>/dev/null | sed 's|node/||'); do
            kubectl get --raw "/api/v1/nodes/$n/proxy/stats/summary" 2>/dev/null \
              | jq -r --arg n "$n" '"| \($n) | \(.node.memory.workingSetBytes/1048576|floor) MiB | \(.node.memory.usageBytes/1048576|floor) MiB |"' >> "$sum" \
              || echo "| $n | (unavailable) | |" >> "$sum"
          done

          # Per-component RAM inventory (issue #8): pull every pod's workingSet
          # from the kubelet summary across nodes, aggregate by namespace, and
          # list the heaviest pods. Raw JSON saved for offline analysis.
          mkdir -p /tmp/diag
          pods=/tmp/diag/pods-memory.json
          echo '[]' > "$pods"
          for n in $(kubectl get nodes -o name 2>/dev/null | sed 's|node/||'); do
            kubectl get --raw "/api/v1/nodes/$n/proxy/stats/summary" 2>/dev/null \
              | jq '[.pods[] | {ns: .podRef.namespace, pod: .podRef.name, ws: (.memory.workingSetBytes // 0)}]' > /tmp/n.json 2>/dev/null || echo '[]' > /tmp/n.json
            jq -s 'add' "$pods" /tmp/n.json > /tmp/m.json && mv /tmp/m.json "$pods"
          done
          {
            echo ""
            echo "### RAM by namespace (workingSet, module-09 full stack)"
            echo ""
            echo "| Namespace | workingSet |"
            echo "|---|---|"
            jq -r 'group_by(.ns)[] | {ns: .[0].ns, t: (map(.ws)|add)} | [.ns, ((.t/1048576)|floor)] | @tsv' "$pods" \
              | sort -t$'\t' -k2 -rn | awk -F'\t' '{printf "| %s | %s MiB |\n", $1, $2}'
            echo ""
            echo "### Heaviest 25 pods"
            echo ""
            echo "| Namespace | Pod | workingSet |"
            echo "|---|---|---|"
            jq -r 'sort_by(-.ws)[:25][] | [.ns, .pod, ((.ws/1048576)|floor)] | @tsv' "$pods" \
              | awk -F'\t' '{printf "| %s | %s | %s MiB |\n", $1, $2, $3}'
          } >> "$sum"

      - name: Collect diagnostics
        if: always()
        run: |
          mkdir -p /tmp/diag
          docker ps -a > /tmp/diag/docker-ps.txt 2>&1 || true
          kubectl get pods -A -o wide > /tmp/diag/pods.txt 2>&1 || true
          kubectl get events -A --sort-by=.lastTimestamp > /tmp/diag/events.txt 2>&1 || true
          kubectl -n argocd get applications -o yaml > /tmp/diag/applications.yaml 2>&1 || true
          kubectl get clusters.postgresql.cnpg.io,workshopdatabases,ksvc,broker,trigger -A > /tmp/diag/custom-resources.txt 2>&1 || true
          for ns in argocd gitea cnpg-system rustfs crossplane-system demo \
                    knative-serving knative-eventing zot argo builds portal pipeline nats \
                    observability; do
            kubectl -n "$ns" get pods -o wide > "/tmp/diag/pods-$ns.txt" 2>&1 || true
            kubectl -n "$ns" logs --tail=200 -l app --prefix > "/tmp/diag/logs-$ns.txt" 2>&1 || true
          done
          # The observability workloads label with app.kubernetes.io/name (not
          # 'app'), so the loop above misses them — capture the collector's
          # current + previous logs (previous catches a CrashLoopBackOff) and a
          # describe, by name.
          for p in $(kubectl -n observability get pods \
                       -l app.kubernetes.io/name=otel-collector -o name 2>/dev/null); do
            n="${p##*/}"
            kubectl -n observability logs "$p" --all-containers --tail=150 > "/tmp/diag/logs-$n.txt" 2>&1 || true
            kubectl -n observability logs "$p" --all-containers --previous --tail=150 >> "/tmp/diag/logs-$n.txt" 2>&1 || true
            kubectl -n observability describe "$p" > "/tmp/diag/describe-$n.txt" 2>&1 || true
          done

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bootstrap-diagnostics
          path: /tmp/diag/
          retention-days: 14
