# Dependency update policy (issue #16).
#
# Grouping: minor + patch updates are batched into ONE PR per ecosystem per
# week (less noise, easy to merge); MAJOR updates come as individual PRs so
# they get a proper look before merging.
#
# Toolchain floor: the apps build on go 1.25 (golang:1.25-alpine, matched by
# build-images.yaml's GOTOOLCHAIN=local test job — so any dep bump that raises a
# go.mod `go` directive past 1.25 fails that PR's CI loudly instead of silently
# downloading a newer toolchain). The pins below are held for a different reason:
# these deps churn fast and we freeze them until the late-August re-verify to
# keep the pre-workshop image stable. Revisit (and likely drop) after the event.
version: 2
updates:
  # --- Go: the three first-party apps ---
  - package-ecosystem: gomod
    directories: ["/apps/portal", "/apps/uploader", "/apps/resizer"]
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      go-minor-patch:
        patterns: ["*"]
        update-types: [minor, patch]
    ignore:
      - dependency-name: "github.com/minio/minio-go/v7"
      - dependency-name: "golang.org/x/image"
      - dependency-name: "go.opentelemetry.io/otel*"
      - dependency-name: "go.opentelemetry.io/contrib/*"

  # --- npm: the Slidev deck ---
  - package-ecosystem: npm
    directory: "/slides"
    schedule:
      interval: weekly
    groups:
      slides-minor-patch:
        patterns: ["*"]
        update-types: [minor, patch]

  # --- GitHub Actions used by the workflows ---
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      ci-actions-minor-patch:
        patterns: ["*"]
        update-types: [minor, patch]
