# The console's "New Application" permission (the golden path, PRD-0003): the
# portal needs to CREATE and DELETE Application XRs (group platform.cloudbox.io,
# plural applications) — the composite that fans out into a Knative workload, a
# WorkshopDatabase and a bucket. Same lesson as portal-access.yaml: YOU, the
# platform owner, hand the portal exactly this scoped write grant; the portal
# cannot grant itself anything. Scoped to `demo` only (where apps are composed).
# Copy this file into gitops/components/demo/ and push.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: portal-applications
  namespace: demo
rules:
  - apiGroups: [platform.cloudbox.io]
    resources: [applications]
    verbs: [create, get, list, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: portal-applications
  namespace: demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: portal-applications
subjects:
  - kind: ServiceAccount
    name: portal
    namespace: portal
