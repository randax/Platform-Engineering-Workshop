# Fault 03 — fixed manifests.
apiVersion: v1
kind: Namespace
metadata:
  name: faultlab-03
  labels:
    workshop/fault: "03"
---
# A plain standalone postgres for this scenario — the official image (its
# docker-entrypoint honors POSTGRES_PASSWORD; the CNPG image does NOT, it's
# meant to be driven by the operator).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-db
  namespace: faultlab-03
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-db
  template:
    metadata:
      labels:
        app: inventory-db
    spec:
      containers:
        - name: postgres
          image: docker.io/library/postgres:18-alpine
          env:
            - name: POSTGRES_PASSWORD
              value: inventory123
            - name: POSTGRES_DB
              value: inventory
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-db
  namespace: faultlab-03
spec:
  selector:
    app: inventory-db
  ports:
    - port: 5432
      targetPort: 5432
---
# The consumer: checks the database every 5 seconds and logs the result.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-api
  namespace: faultlab-03
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders-api
  template:
    metadata:
      labels:
        app: orders-api
    spec:
      containers:
        - name: client
          image: docker.io/library/postgres:18-alpine
          command: ["/bin/sh", "-c"]
          args:
            - |
              while true; do
                printf '%s ' "$(date '+%H:%M:%S')"
                if pg_isready -h inventory-db -p 5432 -t 3 >/dev/null 2>&1; then
                  echo "OK: database reachable"
                else
                  echo "ERROR: cannot reach inventory-db:5432"
                fi
                sleep 5
              done
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
---
# Security hardening — now actually matching the client's labels.
# was: matchLabels app: orders  (no pod carries that label)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: protect-inventory-db
  namespace: faultlab-03
spec:
  endpointSelector:
    matchLabels:
      app: inventory-db
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: orders-api
