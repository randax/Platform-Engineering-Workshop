# Fault 01 — do not read description.md until you have a diagnosis!
apiVersion: v1
kind: Namespace
metadata:
  name: faultlab-01
  labels:
    workshop/fault: "01"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: faultlab-01
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: docker.io/library/busybox:1.37.00
          command: ["httpd", "-f", "-p", "8080"]
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: 16Mi
              cpu: 10m
