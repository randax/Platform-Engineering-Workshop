# Fault 04 — fixed manifests.
apiVersion: v1
kind: Namespace
metadata:
  name: faultlab-04
  labels:
    workshop/fault: "04"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-db
  namespace: faultlab-04
spec:
  replicas: 1
  selector:
    matchLabels:
      role: database
  template:
    metadata:
      labels:
        role: database
        app: inventory-db
    spec:
      containers:
        - name: postgres
          image: ghcr.io/cloudnative-pg/postgresql:18.4-system-trixie
          env:
            - name: POSTGRES_PASSWORD
              value: inventory123
            - name: POSTGRES_DB
              value: inventory
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: 128Mi
              cpu: 50m
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-db
  namespace: faultlab-04
spec:
  selector:
    app: inventory-db
  ports:
    - port: 5432
      targetPort: 5432
---
# The cache no longer carries the copy-pasted app: inventory-db label, so the
# inventory-db Service selector no longer matches its pods.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: session-cache
  namespace: faultlab-04
spec:
  replicas: 1
  selector:
    matchLabels:
      role: cache
  template:
    metadata:
      labels:
        role: cache
        app: session-cache
    spec:
      containers:
        - name: cache
          image: docker.io/library/busybox:1.37.0
          command: ["sleep", "infinity"]
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-api
  namespace: faultlab-04
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders-api
  template:
    metadata:
      labels:
        app: orders-api
    spec:
      containers:
        - name: client
          image: ghcr.io/cloudnative-pg/postgresql:18.4-system-trixie
          command: ["/bin/sh", "-c"]
          args:
            - |
              while true; do
                printf '%s ' "$(date '+%H:%M:%S')"
                if pg_isready -h inventory-db -p 5432 -t 3 >/dev/null 2>&1; then
                  echo "OK: database reachable"
                else
                  echo "ERROR: connection to inventory-db:5432 failed"
                fi
                sleep 3
              done
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
