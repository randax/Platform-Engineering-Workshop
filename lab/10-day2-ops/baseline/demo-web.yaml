# Module 10's day-2 baseline workload. inject.sh copies this file to
# gitops/components/demo/demo-web.yaml in the attendee's platform repo the
# first time it runs (idempotent setup step) — the attendee never hand-copies
# it the way module 02's welcome.yaml is copied.
#
# Image: the pre-pulled, digest-pinned ghcr.io/knative/helloworld-go already
# used by modules 06-09's hello-ksvc.yaml (see lab/06-serverless/hello-ksvc.yaml).
# Reusing it means module 10 needs no in-cluster build (no dependency on the
# stretch build modules) and, crucially, its own main() already does
# `log.Fatal(http.ListenAndServe(":"+os.Getenv("PORT"), nil))` with PORT
# defaulting to 8080 — exactly the crash mechanism scenario 1 poisons.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-web
  template:
    metadata:
      labels:
        app: demo-web
    spec:
      containers:
        - name: web
          image: ghcr.io/knative/helloworld-go@sha256:c2b7412fbea6f1ef24a0cac60698e88df7ae3c4278e42d0cb34fe7d4b2641bba
          ports:
            - containerPort: 8080
          env:
            - name: TARGET
              value: "Cloudbox day-2 ops"
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 32Mi
              cpu: 25m
---
apiVersion: v1
kind: Service
metadata:
  name: demo-web
spec:
  selector:
    app: demo-web
  ports:
    - port: 80
      targetPort: 8080
