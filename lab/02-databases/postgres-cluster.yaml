apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: workshop-db
  namespace: default
spec:
  instances: 3

  # PostgreSQL configuration
  postgresql:
    parameters:
      # Connection settings
      max_connections: "200"
      superuser_reserved_connections: "3"

      # Memory settings
      shared_buffers: "256MB"
      effective_cache_size: "1GB"
      work_mem: "4MB"
      maintenance_work_mem: "64MB"

      # WAL settings
      wal_buffers: "16MB"
      checkpoint_completion_target: "0.9"

      # Query planner
      random_page_cost: "1.1"
      effective_io_concurrency: "200"
      default_statistics_target: "100"

  # Database initialization
  bootstrap:
    initdb:
      database: appdb
      owner: app
      secret:
        name: workshop-db-app-user

  # Storage configuration
  storage:
    size: 1Gi
    storageClass: "local-path"

  # Resource limits
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  # Enable monitoring
  monitoring:
    enabled: true

  # Backup configuration (requires external storage)
  # backup:
  #   retention: "30d"
  #   barmanObjectStore:
  #     destinationPath: "s3://backup-bucket/postgres"
  #     s3Credentials:
  #       accessKeyId:
  #         name: backup-credentials
  #         key: ACCESS_KEY_ID
  #       secretAccessKey:
  #         name: backup-credentials
  #         key: SECRET_ACCESS_KEY
  #     wal:
  #       retention: "7d"

---
apiVersion: v1
kind: Secret
metadata:
  name: workshop-db-app-user
  namespace: default
type: kubernetes.io/basic-auth
stringData:
  username: app
  password: "super-secret-password-123"