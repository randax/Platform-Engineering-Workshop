# The developer experience: this is ALL a developer writes to get a database
# plus an S3 bucket. Copy to gitops/components/demo/my-database.yaml and push.
#
# Crossplane v2: this is a namespaced XR created directly — not a Claim.
apiVersion: platform.cloudbox.io/v1alpha1
kind: WorkshopDatabase
metadata:
  name: my-db
spec:
  # One knob — a T-shirt size. It bundles compute, storage and HA instances.
  size: small
